body:
  text: 脾胃論醫家類提要臣等謹案脾胃論三卷金李杲撰杲既著辨惑論恐世俗不悟復為此書其說以土為萬物之母故獨重脾胃引經立論精鑿不磨明孫一奎醫㫖緒餘云東垣生當金元之交中原擾攘土失其所人疲奔命或以勞倦傷脾或以憂恐傷脾或以饑飽傷脾病有緩急不得不以急者為先務此真知杲者也前有元好問序考遺山文集有杲所著傷寒㑹要引一篇備載其所治驗元史方技𫝊全取之而此序獨不見集中意其偶有散佚歟又有羅天益後序一篇天益字謙父杲晚年弟子盡得其𫝊元硯堅東垣老人𫝊稱杲臨終取平日所著書檢勘卷帙以次相從列於几前囑謙父曰此書付汝者即其人也乾隆四十五年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀原序天之邪氣感則害人五臟八風之邪中人之髙者也水榖之寒熱感則害人六腑謂水榖入胃其精氣上注於肺濁溜於腸胃飲食不節而病者也地之濕氣感則害人皮膚筋脈必從足始者也內經說百病皆由上中下三者及論形氣兩虛即不及天地之邪乃知脾胃不足為百病之始有餘不足世醫不能辨之者蓋已久矣往者遭壬辰之變五六十日之間為飲食勞倦所傷而殁者將百萬人皆謂由傷寒而殁後見明之辨內外傷及飲食勞倦傷一論而後知世醫之誤學術不明誤人乃如此可不大哀耶明之既著論矣且懼俗蔽不可以猝悟也故又著脾胃論丁寧之上發二書之微下祛千載之惑此書果行壬辰藥禍當無從而作仁人之言其意博哉己酉七月望日遺山元好問序
