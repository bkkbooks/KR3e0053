body:
  text: 脾胃論卷下元李杲撰大腸小腸五臟皆屬於胃胃虛則俱病論黄帝鍼經云手陽明大腸手太陽小腸皆屬足陽明胃小腸之穴在巨虛下亷大腸之穴在巨虛上亷此二穴皆在足陽明胃三里穴下也大腸主津小腸主液大腸小腸受胃之榮氣乃能行津液於上焦溉灌皮毛充實腠理若飲食不節胃氣不及大腸小腸無所禀受故津液涸竭焉内經云耳鳴耳聾九竅不利腸胃之所生也此胃弱不能滋養手太陽小腸手陽明大腸故有此證然亦止從胃弱而得之故聖人混言腸胃之所生也或曰子謂混言腸胃所生亦有據乎予應之曰玉機真臟論云脾不及令人九竅不通謂脾為死隂受胃之陽氣能上升水糓之氣於肺上充皮毛散入四臟今脾無所禀不能行氣於臟腑故有此證此則脾虛九竅不通之謂也雖言脾虛亦胃之不足所致耳此不言脾不言腸胃而言五臟者又何也予謂此說與上三說無以異也葢謂脾不受胃之禀命致五臟所主九竅不能上通天氣皆閉塞不利也故以五臟言之此三者止是胃虛所致耳然亦何止於此胃虛則五臟六腑十二經十五絡四時皆不得營運之氣而百病生焉豈一端能盡之乎脾胃虚則九竅不通論真氣又名元氣乃先身生之精氣也非胃氣不能滋之胃氣者􅂖氣也榮氣也運氣也生氣也清氣也衞氣也陽氣也入天氣人氣地氣乃三焦之氣分而言之則異其實一也不當作異名異論而觀之飲食勞役所傷自汗小便數隂火乗土位清氣不生陽道不行乃隂血伏火沉陽明胃土有燥有熱故化燥火而津液不能停且小便與汗皆亡津液津液至中宮變化為血也血者脉之腑也血亡則七神何依百脉皆從此中變來也人之百病莫大於中風有汗則風邪客之無汗則陽氣固宻腠理閉拒諸邪不能傷也或曰經言陽不勝其隂則五臟氣争九竅不通又脾不及則令人九竅不通名曰重强又五臟不利則九竅不通又頭痛耳鳴九竅不通利腸胃之所生也請析而解之荅曰夫脾者隂土也至隂之氣主静而不動胃者陽土也主動而不息陽氣在於地下乃能生化萬物故五運在上六氣在下其脾長一尺掩太倉太倉者胃之上口也脾受胃禀乃能薫蒸腐熟五糓者也胃者十二經之源水糓之海也平則萬化安病則萬化危五臟之氣上通九竅五臟禀受氣於六腑六腑受氣於胃六腑者在天為風寒暑濕燥火此無形之氣也胃氣和平榮氣上升始生温熱温熱者春夏也行陽二十五度六陽升散之極下而生隂隂降則下行為秋冬行隂道為寒涼也胃既受病不能滋養皮膚血脉筋骨故言五臟之氣已絶於外是六腑生氣先絶五臟無所禀受而氣後絶矣肺本收下又主五氣氣絶則下流與脾土疊於下焦故曰重强胃氣既病則下溜經云濕從下受之脾為至隂本乎地也有形之土下填九竅之源使不能上通於天故曰五臟不和則九竅不通胃者行清氣而上即地之陽氣也積陽成天曰清陽出大竅曰清陽實四肢曰清陽發腠理者也脾胃既為隂火所乗糓氣閉塞而下流即清氣不升九竅為之不利胃之一腑病則十二經元氣皆不足也氣少則津液不行津液不行則血虧故筋皮肉血脉皆弱是氣血俱羸弱矣勞役動作飲食飢飽可不慎乎凡有此病者雖不變易他疾已損其夭年更加之鍼灸用藥差悞欲不夭枉得乎胃虛臟腑經絡皆無所受氣而俱病論夫脾胃虛則濕土之氣溜於臍下腎與膀胱受邪膀胱主寒腎為隂火二者俱弱潤澤之氣不行大腸者庚也燥氣也主津小腸者丙也熱氣也主液此皆屬胃胃虛則無所受氣而亦虛津液不濡睡覺口燥咽乾而皮毛不澤也甲膽風也温也主生化周身之血氣丙小腸熱也主長養周身之陽氣亦皆禀氣於胃則能浮散也升發也胃虛則膽及小腸温熱生長之氣俱不足伏留於有形血脉之中為熱病為中風其為病不可勝紀青赤黄白黒五腑皆滯三焦者乃下焦元氣生發之根蔕為火乗之是六腑之氣俱衰也腑者府庫之府包含五臟及形質之物而藏焉且六腑之氣外無所主内有所受感天地之風氣而生甲膽感暑氣而生丙小腸感濕化而生戊胃感燥氣而生庚大腸感寒氣而生壬膀胱感天一之氣而生三焦此賔父氣無形也風寒暑濕燥火乃温熱寒涼之别稱也行陽二十五度右遷而升浮降沈之化也其虛也皆由脾胃之弱以五臟論之心火亢甚乗其脾土曰熱中脉洪大面煩悶難經云脾病當臍有動氣按之牢若痛動氣築築然堅牢如有積而硬若似痛也甚則亦大痛有是則脾虛病也無則非也更有一辨食入則困倦精神昏冐而欲睡者脾虧弱也且心火太盛左遷入於肝木之分風濕相搏一身盡痛其脉洪大而弦時緩或為眩運戰摇或為麻木不仁此皆風也脾病體重節痛為痛痺為寒痺為諸濕痺為痿輭失力為大疽大癰若以辛熱助邪則為熱病為中風其變不可勝紀木旺運行比越左遷入地助其腎水水得子助入脾為痰涎自入為唾入肝為淚入肺為涕乗肝木而反尅脾土明矣當先於隂分補其陽氣升騰行其陽道而走空竅次加寒水之藥降其隂火黄蘖黄連之類是也先補其陽後㵼其隂脾胃俱旺而復於中焦之本位則隂陽氣平矣火曰炎上水曰潤下今言腎主五液上至頭出於空竅俱作泣涕汗涎唾者何也曰病癎者涎沫出於口冷汗出於身清涕出於鼻皆陽蹻隂蹻督衝四脉之邪上行腎水不任熬煎沸騰上行為之也此竒邪為病不繫五行隂陽十二經所拘當從督衝二蹻四穴中竒邪之法治之五臟外有所主内無所受謂無所受盛而外主皮毛血脉肌肉筋骨是也各主空竅若胃氣一虛脾無禀受則四臟忍及經絡見焉葢脾土無陽乃死於經脉皮毛為使建中之名於此見焉病有緩急收散升降浮沉澀滑之類非一從權立法于後如皮毛肌肉之不伸無大熱不能食而渇者加葛根五錢燥熱及胃氣上衝為衝脉所逆或作逆氣而裏急者加炒黄蘖知毋如覺胷中熱而不渇加炒黄芩如胷中結滯氣澀或有熱者亦各加之如食少而小便少者津液不足也勿利之益氣補胃自行矣氣弱氣短者加人參只升陽之劑助陽尤勝加人參如惡熱發熱而躁渇脉洪大白虎湯主之或喘者加人參如渇不止寒水石石膏各等分少少與之即錢氏方中甘露飲主身大熱而小便數或上飲下溲此燥熱也氣燥加白葵花血燥加赤葵花如脉弦只加風藥不可用五苓散如小便行病増者此内燥津液不能停當致津液加炒黄蘖赤葵花如心下痞悶者加黄連一黄芩三減諸甘藥如不能食心下輭而痞者甘草㵼心湯則愈如喘滿者加炙厚朴如胃虛弱而痞加甘草如喘而小便不利者加苦葶藶證中髓氣平則生榮周身及四海皆旺十二神守職皮毛宻實外邪不能侮也胃虛元氣不足諸病所生論夫飲食勞役皆自汗乃足陽明化燥火津液不能停故汗出小便數也邪之大者莫若中風風者百病之長善行而數變雖然無虛邪則風雨寒不能獨傷人必先中虛邪然得賊邪得入矣至於痿厥逆皆由汗出而得之也且冬陽氣伏藏於水土之下如非常泄精陽氣已竭則春令從何而得萬化俱失所矣在人則飲食勞役汗下時出諸病遂生予所以諄諄如此者葢亦欲人知所慎也忽肥忽瘦論黄帝鍼經云寒熱少氣血上下行火氣虛不能寒血虛不能熱血氣俱虛不能寒熱而胃虛不能上行則肺氣無所養故少氣衞氣既虛不能寒也下行乗腎肝助火為毒則隂分氣衰血虧故寒熱少氣血上下行者足陽明胃之脉衰則衝脉并陽明之脉上行於其分逆行七十二度脉之火大旺逆陽明脉中血上行其血衝滿於上若火時退伏於下則血下行故言血上下行俗謂之忽肥忽瘦者是也經曰熱傷氣又曰壯火食氣故脾胃虛而火勝則必少氣不能衞護皮毛通貫上焦之氣而短少也隂分血虧陽分氣削隂陽之分周身血氣俱少不能寒熱故言寒熱也靈樞經云上焦開發宣五糓味熏膚充身澤毛若霧露之溉此則胃氣平而上行也天地隂陽生殺之理在升降浮沉之間論隂陽應象論云天以陽生隂長地以陽殺隂藏然歲以春為首正正也寅引也少陽之氣始於泉下引隂升而在天地人之上即天之分百糓草木皆甲拆於此時也至立夏少隂之火熾於太虛則草木盛茂垂枝布葉乃陽之用隂之體此所謂天以陽生隂長經言歳半以前天氣主之在乎升浮也至秋而太隂之運初自天而下逐隂降而徹地則金振燥令風厲霜飛品物咸殞其枝獨在若乎毫毛至冬則少隂之氣復伏於泉下水氷地坼萬類周宻隂之用陽之體也此所謂地以陽殺隂藏經言歳半已後地氣主之在乎降沉也至於春氣温和夏氣暑熱秋氣清涼冬氣冷冽此則正氣之序也故曰履端於始序則不愆升巳而降降巳而升如環無端運化萬物其實一氣也設或隂陽錯綜勝復之變自此而起萬物之中人一也呼吸升降傚象天地凖繩隂陽葢胃為水糓之海飲食入胃而精氣先輸脾歸肺上行春夏之令以滋養周身乃清氣為天者也升巳而下輸膀胱行秋冬之令為傳化糟粕轉味而出乃濁隂為地者也若夫順四時之氣起居有時以避寒暑飲食有節及不暴喜怒以頥神志常欲四時均平而無偏勝則安不然損傷脾胃真氣下溜或下泄而乆不能升是有秋冬而無春夏乃生長之用䧟於殞殺之氣而百病皆起或久升而不降亦病焉於此求之則知履端之義矣隂陽壽夭論五常政大論云隂精所奉其人壽陽精所降其人夭夫隂精所奉者上奉於陽謂春夏生長之氣也陽精所降下降於隂謂秋冬收藏之氣也且如地之伏隂其精遇春而變動升騰於上即曰生發之氣升極而浮即曰蕃秀之氣此六氣右遷於天乃天之清陽也陽主生故壽夭之元陽其精遇秋而退降墜於下乃為收歛殞殺之氣降極而沈是為閉藏之氣此五運左遷入地乃地之濁隂也隂主殺故天根於外者名曰氣化氣止則化絶根於内者名曰神機神去則機息皆不升而降也地氣者人之脾胃也脾主五臟之氣腎主五臟之精皆上奉於天二者俱主生化以奉升浮是知春生夏長皆從胃中出也故動止飲食各得其所必清必净不令損胃之元氣下乗腎肝及行秋冬殞殺之令則亦合於天數耳五臟之氣交變論五臟别論云五氣入鼻藏於心肺難經云肺主鼻鼻和則知香臭潔古云視聼明而清涼香臭辨而温煖此内受天之氣而外利於九竅也夫三焦之竅開於喉出於鼻鼻乃肺之竅此體也其聞香臭者用也心主五臭舍於鼻葢九竅之用皆禀長生為近心長生於酉酉者肺故知鼻為心之所用而聞香臭也耳者上通天氣腎之竅也乃腎之體而為肺之用葢肺長生於子子乃腎之舍而肺居其中而能聽音聲也一說聲者天之陽音者天之隂在地為五律在人為喉之竅在口乃三焦之用肺與心合而為言出於口也此口心之竅開於舌為體三焦於肺為用又不可不知也肝之竅通於目離為火能耀光而見物故分别五色也肝為之舍腎主五精鼻藏氣於心肺故曰主百脉而行陽道經云脫氣者目盲脫精者耳聾心肺有病而鼻為之不利此明耳目口鼻為清氣所奉於天而心勞胃損則受邪也隂陽升降論易曰兩儀生四象乃天地氣交八卦是也在人則清濁之氣皆從脾胃出榮氣榮養於身乃水糓之氣味化之也清陽為天清陽成天地氣上為雲天氣下為雨水也穀之精氣也氣海也七神也元氣也父清中淸者清肺以􅂇天真清陽出上竅耳日鼻口之七竅是也清中濁者榮華腠理清陽發腠理毛竅也清陽實四肢真氣充實四肢濁隂為地壘隂成地雲出天氣雨出地氣五穀五味之精是五味之化也血榮也維持神明也血之府㑹也毋也濁中清者榮養於神降至中脘雨為血故曰心主血心藏神濁隂出下竅前隂膀胱之竅也濁中濁者堅强骨髓濁隂走五臟散於五臟之血也養血脉潤皮膚肌肉筋者是也而生肉者此也濁隂歸六腑謂毛脉合精經氣歸於腑者是也天氣清静光明者也藏徳不止故不下也天明則日月不明邪害空竅陽氣者閉塞地氣者冐明雲霧不精則上應白露不下交通不表萬物命故不施不施則名木多死惡氣不發風雨不節白露不下則菀藁不榮賊風數至暴雨數起天地四時不相保與道相失則未央絶滅唯聖人從之故身無竒病萬物不失生氣不竭此說人之不遇大寒傷形大熱傷氣四時節候變更之異氣及飲食失節妄作勞役心生好惡皆令元氣不行氣化為火乃失生夭折之由耳調理脾胃治驗治法用藥若不明升降浮沉差互反損論予病脾胃久衰視聽半失此隂盛乗陽加之氣短精神不足此由弦脉令虛多言之過皆陽氣衰弱不得舒伸伏匿於隂中耳癸卯歳六七月間淫雨隂寒踰月不止時人多病泄利濕多成五泄故也一日予體重肢節疼痛大便泄并下者三而小便閉塞思其治法按内經標本論大小便不利無問標本先利大小便又云在下者引而竭之亦是先利小便也又云諸泄利小便不利先分别之又云治濕不利小便非其治也皆當利其小便必用淡味滲泄之劑以利之是其法也噫聖人之法雖布在方册其不盡者可以求責耳今客邪寒濕之􅁋從外而入裏以暴加之若從巳上法度用淡滲之劑以除之病雖即巳是降之又降是復益其隂而重竭其陽氣矣是陽氣愈削而精神愈短矣是隂重强而陽重衰矣反助其邪之謂也故必用升陽風藥即差以𦍑活獨活柴胡升麻各一錢防風根截半錢炙甘草根截半錢同㕮咀水四中盞煎至一盞去柤梢熱服大法去濕寒之勝助風以平之又曰下者舉之得陽氣升騰而去矣又法云客者除之是因曲而為之直也夫聖人之法可以類推舉一而知百病者也若不逹升降浮沉之理而一槩施治其愈者幸也戊申六月初樞判白文舉年六十二素有脾胃虛損病目疾時作身面目睛俱黄小便或黄或白大便不調飲食减少氣短上氣怠惰嗜卧四肢不收至六月中目疾復作醫以㵼肝散下數行而前疾增劇予謂大黄牽牛雖除濕熱而不能走經絡下咽不入肝經先入胃中大黄苦寒重虛其胃牽牛其味至辛能㵼氣重虛肺本𠻳大作葢標實不去本虛愈甚加之適當暑雨之際素有黄證之人所以增劇也此當於脾胃肺之本臟㵼外經中之濕熱製清神益氣湯主之而俞清神益氣湯茯苓升麻巳上各二分澤㵼蒼术防風已上各三分生薑五分此藥能走經除濕熱而不守故不㵼本臟補肺與脾胃本中氣之虛弱青皮一分橘皮生甘草白芍藥白术巳上各二分人參五分此藥皆能守本而不走經不走經者不滋經絡中邪守者能補臟之元氣黄蘖一分麥門冬人參巳上各二分五味子三分此藥去時令浮熱濕蒸右件剉如麻豆大都作一服水二盞煎至一盞去柤稍熱空心服火熾之極金伏之際而寒水絶體於此時也故急救之以生脉散除其濕熱以惡其太甚肺欲收心苦緩皆酸以收之心火盛則甘以㵼之故人參之甘佐以五味子之酸孫思邈云夏月常服五味子以補五臟氣是也麥門冬之㣲苦寒能滋水之源於金之位而清肅肺氣又除火刑金之𠻳而斂其痰邪復微加黄蘖之苦寒以為守位滋水之流以鎮墜其浮氣而除兩足之痿弱也范大諫之内素有脾胃之證時顯煩躁胷中不利大便不通初冬出外而晩歸為寒氣怫鬱悶亂大作火不得伸故也醫疑有熱治以疎風丸大便行而病不減又疑藥力小復加七八十丸下兩行前證仍不減復添吐逆食不能停痰唾稠粘湧出不止眼黑頭旋惡心煩悶氣短促上喘無力不欲言心神顛倒兀兀不止目不敢開如在風雲中頭苦如裂身重如山四肢厥冷不得安卧余謂前證乃胃氣已損復下兩次則重虛其胃而痰厥頭痛作矣製半夏白术天麻湯主之而愈半夏白术天麻湯黄蘖二分乾薑三分天麻蒼术白茯苓黄耆澤㵼人參已上各五分白术炒麴已上各一錢半夏湯洗七次大麥糵麵橘皮已上各一錢五分右件㕮咀每服半兩水二盞煎至一盞去柤帶熱服食前此頭痛苦甚謂之足太隂痰厥頭痛非半夏不能療眼黑頭旋風虛内作非天麻不能除其由為定風草獨不為風所動也黄耆甘温㵼火補元氣人參甘温㵼火補中益氣二术俱甘苦温甘除濕補中益氣澤苓利小便𨗳濕橘皮苦温益氣調中升陽麴消食苦胃中滯氣大麥蘖麵寛中助胃氣乾薑辛熱以滌中寒黄蘖苦大寒酒洗以主冬天少火在泉發躁也戊申有一貧士七月中病脾胃虛弱氣促憔悴因與人參芍藥湯人參芍藥湯麥門冬二分當歸身人參巳上各三分炙甘草白芍藥黄耆巳上各一錢五味子五箇右件㕮咀分作二服毎服用水二盞煎至一盞去柤稍熱服既愈繼而冬居曠室卧熱炕而吐血數次予謂此人久虛弱臍有形而有大熱在内上氣不足陽氣外虛當補表之陽氣㵼裏之虛熱冬居曠室衣服復單薄是重虛其陽表有大寒壅遏裏熱火邪不得舒伸故血出於口因思仲景太陽傷寒當以麻黄湯發汗而不與之遂成衂血却與之立愈與此甚同因與麻黄人參芍藥湯麻黄人參芍藥湯人參益上焦元氣不足而實其表也麥門冬已上各三分桂枝以補皮虛當歸身和血養血各五分麻黄去其外寒炙甘草補其脾白芍藥黄耆已上各一錢五味子二箇安其肺氣右件㕮咀都作一服水三盞煑麻黄一味令沸去沫至二盞入餘藥同煎至一盞去柤熱服臨卧升陽散火湯治男子婦人四肢發熱肌熱筋痺熱骨髓中熱發困熱如燎捫之烙手此病多因血虛而得之或胃虛過食冷物抑遏陽氣於脾土火鬱則發之生甘草二錢防風二錢五分炙甘草三錢升麻葛根獨活白芍藥𦍑活人參已上各五錢柴胡八錢右㕮咀毎服秤半兩水三大盞煎至一盞去柤稍熱服忌寒涼之物及泠水月餘安胃湯治因飲食汗出日久心中虛風虛邪令人半身不遂見偏風痿痺之證當先除其汗慓悍之氣按而收之黄連揀浄去鬚五味子去子烏梅去核生甘草已上各一錢五分熟甘草三分升麻稍二分右㕮咀分作二服每服水二盞煎至一盞去柤温服食逺忌濕麵酒五辛大料物之類清胃散治因服補胃熱藥而致上下牙痛不可忍牽引頭腦滿熱發大痛此足陽明别絡入腦也喜寒惡熱此陽明經中熱盛而作也真生地黄當歸身已上各三分牡丹皮半錢升麻一錢黄連揀浄六分如黄連不好更加一分春夏月倍之大抵黄連臨處増减無定右為細末都作一服水一盞半煎至七分去柤梢冷服之清陽湯治口喎頰顋急𦂳胃中火盛必汗不止而小便數也紅花酒黄蘖桂枝已上各一分生甘草蘇木已上各五分炙甘草一兩葛根一錢五分當歸身升麻黄耆已上各二錢右件為咀都作一服酒三大盞煎至一盞三分去柤稍熱服食前服訖以火熨摩𦂳結處而愈夫口喎筋急者是筋絡血脉中大寒此藥以代燔鍼刼刺破血以去其凝結内則泄衝脉之火熾胃風湯治虛氣證能食麻木牙闗急搐目内蠕瞤胃中有風獨面腫香白芷一錢二分炙甘草一錢五分升麻二錢葛根一錢蒼术一錢柴胡三分藁本三分蔓荆子一分𦍑活三分黄蘖三分當歸身一錢麻黄五分不去節草豆蔲三分乾生薑二分棗四枚右件剉如麻豆大分二服毎服水二大盞煎至一盞去柤熱服食後服陽明病濕勝自汗論或曰濕之與汗隂乎陽乎曰西南坤土也脾胃也人之汗猶天地之雨也隂滋其濕則為霧露雨也隂濕寒下行之地氣也汗多則亡陽陽去則隂勝也甚為寒中濕勝則音聲如從瓮印出云云濕若中水也相家有說土音如居深瓮中言其壅也逺也不出也其為濕審矣又知此二者一為隂寒也内經云氣虛則外寒雖見熱中蒸蒸為汗終傳大寒知始為熱中表虛亡陽不任外寒終傳寒中多成痺寒矣色以候天脉以候地形者乃候地之隂陽也故以脉氣候之皆有形無形可見者也調衞湯治濕勝自汗補衞氣虛弱表虛不任外寒黄耆麻黄已上各一錢生甘草五分猪苓二分𦍑活七分麥門冬三分當歸梢五分生地黄三分生黄芩五分五味子七枚蘇木一分紅花一分半夏五分湯洗七次用右㕮咀如麻豆大作一服水二盞煎至一盞去柤稍熱服中風證必自汗汗多不得重發汗故禁麻黄而用根節也濕熱成痿肺金受邪論六七月間濕令大行子能令母實而熱旺濕熱相合而刑庚大腸故寒涼以救之燥金受濕熱之邪絶寒水生化之源源絶則腎虧痿厥之病大作腰已下痿輭癱瘓不能動行走不正兩足欹側以清燥湯主之柴胡一分黄連一分去鬚酒黄蘖一分麥門冬生地黄炙甘草猪苓麴已上各二分人參白茯苓升麻已上各三分橘皮白术澤㵼已上各五分蒼术九分黄耆一錢五分五味子九枚右㕮咀如麻豆大每服半兩水二盞半煎至一盞去柤稍熱空心服􅂇陽和血補氣湯治眼發後上熱壅白眼紅多眵淚無疼痛而􅐊澀難開此服苦寒藥太過而真氣不能通九竅也故眼昏花不明宜􅂇陽和血補氣香白芷二分蔓荆子三分炙甘草當歸身酒洗柴胡已上各五分升麻防風已上各七分黄耆一錢右㕮咀都作一服水一盞半煎至一盞去柤熱服臨卧避風處睡忌風寒及食冷物升陽湯治一日大便三四次溏而不多有時泄㵼腹中鳴小便黄柴胡益智仁當歸身橘皮已上各三分升麻六分甘草二錢黄耆三錢紅花少許右㕮咀分作二服毎服水二大盞煎至一盞去柤稍熱服升陽除濕湯治脾胃虛弱不思飲食腸鳴腹痛泄㵼無度小便黄四肢困弱甘草大麥蘖麵如胃寒腹鳴者加陳皮猪苓已上各三分澤㵼益智仁半夏防風神麯升麻柴胡𦍑活已上各五分蒼术一錢右㕮咀作一服水三大盞生薑三片枣二枚同煎至一盞去柤空心服益胃湯治頭悶勞動則微痛不喜飲食四肢怠惰躁熱短氣口不知味腸鳴大便微溏黄色身體昏悶口乾不喜食冷黄耆甘草半夏已上各二分黄芩柴胡人參益智仁白术已上各三分當歸梢陳皮升麻已上各五分蒼术一錢五分右㕮咀作一服水二大盞煎至一盞去柤稍熱服食前忌飲食失節生冷硬物酒濕麵生薑和中湯治食不下口乾虛渇四肢困倦生甘草炙甘草已上各一分酒黄芩柴胡橘皮已上各二分升麻三分人參葛根藁本白术已上各五分𦍑活七分蒼术一錢生黄芩二錢右為咀作一服水二盞生薑五片枣三枚擘開同煎至一盞去柤稍熱服之食前强胃湯治因飲食勞役所傷腹脇滿悶氣短遇春口淡無味遇夏雖熱而惡寒如飽不喜食冷物黄蘖甘草已上各五分升麻柴胡當歸身陳皮已上各一錢生薑麯已上各一錢五分草豆蔲一錢半夏人參已上各三錢黄耆一兩右㕮咀毎服三錢水二大盞煎至一盞去柤温服食前温胃湯專治服寒藥多脾胃虛弱胃脘痛人參甘草益智仁縮砂仁厚朴各二分白豆蔲乾生薑澤㵼姜黄已上各三分黄耆陳皮已上各七分右件為極細末毎服三錢水一盞煎至半盞温服食前和中丸人參乾生薑橘紅已上各一錢乾木𤓰二錢炙甘草三錢右為細末蒸餅為丸如梧桐子大毎服三五十丸温水送下食前服藿香安胃散治脾胃虛弱不進飲食嘔吐不待腐熟藿香丁香人參已上各二錢五分橘紅五錢右件四味為細末毎服二錢水一大盞生薑一片同煎至七分和柤冷服食前異功散治脾胃虛冷腹鳴腹痛自利不思飲食人參茯苓白术甘草橘紅已上各五分右為麤散毎服五錢水二大盞生薑三片枣一枚同煎至一盞去柤温服食前先用數服以正其氣飲食傷脾論四十九難曰飲食勞倦則傷脾又云飲食自倍腸胃乃傷腸澼為痔夫脾者行胃津液磨胃中之糓主五味也胃既傷則飲食不化口不知味四肢倦困心腹痞滿兀兀欲吐而惡食或為餐泄或為腸澼此胃傷脾亦傷明矣大抵傷飲傷食其治不同傷飲者無形之氣也宜發汗利小便以𨗳其濕傷食者有形之物也輕則消化或損其糓此最為妙也重則方可吐下今立數方區分類析以列于後五苓散治煩渇飲水過多或水入即吐心中淡淡停濕在内小便不利桂一兩茯苓猪苓白术已上各一兩五錢澤㵼二兩五錢右為細末毎服二錢熱湯調服不拘時候服訖多飲熱湯有汗出即愈如瘀肉在裏身發黄疸濃煎茵蔯湯調下食前服之如疸發渇及中暑引飲亦可用水調服論飲酒過傷夫酒者大熱有毒氣味俱陽乃無形之物也若傷之止當發散汗出則愈矣其次莫如利小便二者乃上下分消其濕今之酒病者往往服酒癥丸大熱之藥下之又有用牽牛大黄下之者是無形元氣受病反下有形隂血乖悞甚矣酒性大熱以傷元氣而復重㵼之况亦損腎水真隂及有形隂血俱為不足如此則隂血愈虛真水愈弱陽毒之熱大旺反增其隂火是以元氣消止折人長命不然則虛損之病成矣酒疸下之久久為黑疸慎不可犯以葛花解酲湯主之葛花解酲湯治飲酒太過嘔吐痰逆心神煩亂胷膈痞塞手足戰摇飲食减少小便不利蓮花青皮去穣三分木香五分橘皮去白人參去蘆猪苓去黑皮白茯苓已上各一錢五分神麯炒黄色澤㵼乾生薑白术各二錢白豆􅅳仁葛花砂仁已上各五錢右為極細末秤和匀毎服三錢七白湯調下但得微汗酒病去矣此葢不得已而用之豈可恃賴日日飲酒此方氣味辛辣偶因酒病服之則不損元氣何者敵酒病也枳术丸治痞消食强胃枳實麩炒黄色去穣一兩白术二兩右同為極細末荷葉褁燒飯為丸如梧桐子大毎服五十丸多用白湯下無時白术者本意不取其食速化但令人胃氣强不復傷也橘皮枳术丸治老㓜元氣虛弱飲食不消臟腑不調心下痞悶枳實麩炒去穣橘皮已上各一兩白术二兩右件為細末荷葉燒飯為丸如梧桐子大毎服五十丸温水送下食逺夫内傷用藥之大法所貴服之强人胃氣令胃氣益厚雖猛食多食重食而不傷此能用食藥者也此藥久久益胃氣令不復致傷也半夏枳术丸治因冷食内傷半夏湯泡七次焙乾枳實麩炒黄色白术已上各二兩右同為極細末荷葉褁燒飯為丸如梧桐子大毎服五十丸添服不妨無定法如熱湯浸餅蒸為丸亦可如食傷寒熱不調毎服加上三黄丸十丸白湯下更作一方加澤㵼一兩為丸有小便淋者用木香乾薑枳實丸除風寒滯氣消導飲食木香三錢乾薑五錢炮枳實一兩炒白术一兩五錢右為極細末荷葉燒飯為丸如梧桐子大毎服三五十丸温水送下食前木香人參生薑枳术丸開胃進食乾生薑二錢五分木香三錢人參三錢五分陳皮四錢枳實一兩炒黄白术一兩五錢右為極細末荷葉燒飯為丸如梧桐子大毎服三五十丸温水送下食前忌飽食和中丸治病久虛弱厭厭不能食而臟腑或閉或溏此胃氣虛弱也常服則和中理氣消痰去濕厚腸胃進飲食木香二錢五分枳實麩炒炙甘草已上各三錢五分㯽榔四錢五分陳皮去白八錢半夏湯洗七次厚朴薑汁已上各一兩白术一兩二錢右為細末生薑自然汁浸蒸餅為丸如梧桐子大毎服三五十丸温水湯下食前或食逺交泰丸升陽氣㵼隂火調榮氣進飲食􅂇精神寛腹中除怠惰嗜卧四肢不收沈困懶倦乾薑炮製三分巴豆霜五分人參去蘆肉桂去皮已上各一錢柴胡去苖小椒炒去汗并閉目去子白术已上各分一錢五厚朴去皮剉炒各加七錢酒煑苦練白茯苓砂仁已上各三錢川烏頭炮去皮臍四錢五分知毋七錢一半炒一半酒炒此一味春夏所宜秋冬去之吳茱茰湯泡七次五錢黄連去鬚秋冬減一錢五分皂角水洗煨去皮弦紫菀去苖已上各六錢右除巴豆霜另研入外同為極細末煉蜜為丸如梧桐子大毎服十丸温水送下虛實加減三稜消積丸治傷生冷硬物不能消化心腹滿悶丁皮益智已上各三錢巴豆炒去皮米炒黒焦去米茴香炒陳皮青橘皮已上各五錢京三稜炮廣茂炮炒麴已上各七錢右件為細末醋打麵糊為丸如梧桐子大毎服十丸至二十丸温生薑湯送下食前量虛實加減得更衣止後服備急丹治心腹百病卒痛如錐刺及脹滿不快氣急病治之錦紋川大黄為末乾薑炮為末巴豆先去皮膜心研如泥霜出油用霜右件三味等分同一處研勻煉蜜成劑臼内杵千百下丸如大豌豆大夜卧温水下一丸如氣實者加一丸如卒病不計時候服婦人有孕不可服如所傷飲食在胸膈間兀兀欲吐反覆悶亂以物探吐去之神保丸治心膈痛腹痛血痛腎氣痛脇下痛大便不通氣噎宿食不消木香胡椒已上各二錢五分巴豆十枚去皮油心膜研乾蝎七枚右件四味為末湯浸蒸餅為丸麻子大硃砂三錢為衣毎服五丸如心膈痛杮蔕燈心湯下如腹痛杮蔕煨薑煎湯下如血痛炒薑醋湯下如腎氣痛脇下痛茴香酒下如大便不通蜜調㯽榔末一錢下如氣噎木香湯下如宿食不消茶酒漿飲任下雄黄聖餅子治一切酒食所傷心腹滿不快雄黄五錢巴豆一百箇去油心膜白麵十兩重羅過右件三味内除白麵入丸用餘藥同為細末共麵和匀用新水和作餅子如手大以漿水煑煑至浮於水上漉出控旋㸔硬輭搗作劑丸如梧桐子大捻作餠子毎服五七餠子加至十餅十五餠嚼破一餠利一行二餠利二行茶酒任下食前蠲飲枳實丸逐飲消痰𨗳滯清膈枳實麩炒去穣半夏湯洗陳皮去白已上各一兩黑牽牛八兩内取頭末三兩右為細末水煑麵糊為丸如梧桐子大毎服五十丸食後生薑湯下感應丸治虛中積冷氣弱有傷停積胃脘不能傳化或因氣傷冷因饑飽食飲酒過多心下堅滿兩脇脹痛心腹大疼霍亂吐㵼大便頻後重遲澀久痢赤白膿血相雜米榖不消愈而復發又治中酒嘔吐痰逆惡心喜唾頭旋胸隔痞悶四肢倦怠不欲飲食又治姙娠傷冷新産有傷若久有積寒喫熱藥不效者並悉治之又治久病形羸荏苒歳月漸至虛弱面黄肌瘦飲食或進或退大便或秘或泄不拘久新積冷並皆治之乾薑泡製一兩南木香去蘆丁香已上各一兩五錢百草霜二兩肉豆蔲去皮三十箇巴豆去皮心膜油研七十箇杏仁一百四十箇湯浸去皮尖研膏右七味除巴豆粉百草霜杏仁三味外餘四味搗為細末却與三味同拌研令細用好蠟匱和先將蠟六兩鎔化作汁以重綿濾去柤更以好酒一升於銀石器内煑蠟溶滚數沸傾出候酒冷其蠟自浮於上取蠟秤用丸春夏修合用清油一兩於銚内熬令末散香熟次下酒煑蠟四兩同化作汁就鍋内乗熱拌和前項藥末秋冬修合用清油一兩五錢同煎煑熟作汁和匱藥末成劑分作小錠子以油單紙褁之旋丸服耳神應丸治因一切冷物冷水及潼乳酪水腹痛腸鳴水糓不化丁香木香已上各二錢巴豆杏仁百草霜乾薑已上各五錢黄蠟二兩右先將黄蠟用好醋煑去柤穢將巴豆杏仁同炒黑煙盡研如泥將黄蠟再上火春夏入小油五錢秋冬入小油八錢溶開入在杏仁巴豆泥子内同攪旋下丁香木香等藥末研匀搓作挺子油紙褁子旋丸用毎服三五十丸温米飲送下食前日三服大有神效白术安胃散治一切㵼痢無問膿血相雜裏急窘痛日夜無度又治男子小膓氣痛及婦人臍下虛冷并産後兒枕塊痛亦治産後虛弱寒熱不止者五味子烏梅取肉炒乾已丄各五錢車前子茯苓白术已上各一兩米殻三兩去項蒂穣醋煮一宿炒乾右為末毎服五錢水一盞半煎至一盞去柤空心温服聖餅子治㵼痢赤白臍腹撮痛久不愈者黄丹二錢定粉舶上硫黄陀僧已上各一錢輕粉少許右細剉為末入白麵四錢七滴水和如指尖大捻作餠子隂乾食前温漿水磨服之大便黑色為效當歸和血散治腸澼下血濕毒下血川芎四分青皮槐花荆芥穗熟地黄白术已上各六分當歸升麻已上各一錢右件為細末毎服二三錢清米飲湯調下食前服訶梨勒丸治休息痢晝夜無度腥臭不可近臍腹撮痛諸藥不效訶子五錢去核研椿根白皮一兩母丁香三十箇右為細末醋麵糊丸如梧桐子大毎服五十丸陳米飯湯入醋少許送下五更三日三服效脾胃損在調飲食適寒温十四難曰損其脾者調其飲食慎其寒温夫脾胃大腸小腸三焦膀胱倉廪之本營之所居名曰氣能化糟粕轉味而出入者也若飲食熱無圴圴寒無滄滄寒温中適故氣將持乃不致邪僻或飲食失節寒温不適所生之病或溏泄無度或心下痞悶腹脇䐜脹口失滋味四肢困倦皆傷於脾胃所致而然也腸胃為市無物不包無物不入若風寒暑濕燥一氣偏勝亦能傷脾損胃觀證用藥者宜詳審焉胃風湯治大人小兒風冷乗虛入客腸胃水糓不化泄㵼注下腹脇虛滿腸鳴㽲痛及腸胃濕毒下如豆汁或下瘀血日夜無度並宜服之人參去蘆白茯苓去皮芎藭桂去柤皮當歸去苖白芍藥白术已上各等分右為麤散毎服二錢以水一大盞入粟米數百餘粒同煎至七分去柤稍熱服空心食前小兒量力減之三黄丸治丈夫婦人三焦積熱上焦有熱攻衝眼目赤腫頭項腫痛口舌生瘡中焦有熱心膈煩燥不羙飲食下焦有熱小便赤澀大便袐結五臟俱熱即生癰癤瘡痍及治五般痔疾糞門腫痛或下鮮血黄連去蘆黄芩去蘆大黄已上各一兩右為細末煉蜜為丸如梧桐子大毎服三十丸用熟水吞下如臟腑壅實加服丸數小兒積熱宜服之白术散治虛熱而渇人參去蘆白术木香白茯苓去皮藿香葉去土甘草炒已上各一兩乾葛二兩右件為麤末毎服三錢至五錢水一盞煎至五分温服如飲水者多煎與之無時服如不能食而渴潔古先師倍加葛根如能食而渇白虎湯加人參服之加減平胃散治脾胃不和不思飲食心腹脇肋脹滿刺痛口苦無味胷滿短氣嘔噦惡心噫氣吞酸面色萎黄肌體瘦弱怠惰嗜卧體重節痛常多自利或發霍亂及五噎八痞膈氣反胃甘草剉炒二兩厚朴去粗皮薑製炒香陳皮去白已上各三兩二錢蒼术去粗皮米泔浸五兩右為細末毎服二錢水一盞入生薑二片乾棗二枚同煎至七分去柤温服或去薑枣帶熱服空心食前入鹽一捻沸湯㸃服亦得常服調氣煖胃化宿食消痰飲辟風寒冷濕四時非節之氣如小便赤澀加白茯苓澤㵼如米糓不化食飲多傷加枳實如胷中氣不快心下痞氣加枳殻木香如脾胃困弱不思飲食加黄耆人參如心下痞悶腹脹者加厚朴甘草減半如遇夏則加炒黄芩如遇雨水濕潤時加茯苓如遇有痰從加半夏陳皮凡加時除蒼术厚朴外依例加之如一服五錢有痰用半夏五分如𠻳飲食減少脉弦細加當歸黄耆用身如脉洪大緩加黄連黄芩如大便硬加大黄三錢芒硝二錢先嚼麩炒桃仁爛以藥送下散滯氣湯治因憂氣結中脘腹皮底微痛心下痞滿不思飲食雖食不散常常有痞氣當歸身二分陳皮二分柴胡四分炙甘草一錢半夏一錢五分生薑五片紅花少許右件剉如麻豆大都作一服水二盞煎至一盞去柤稍熱服食前忌濕麵酒通幽湯治幽門不通上衝吸門不開噎塞氣不得上下治在幽門閉大便難此脾胃多受熱中多有此證名之曰下脘不通桃仁泥紅花已上各一分生地黄熟地黄已上各五分當歸身炙甘草升麻已上各一錢右㕮咀都作一服水二大盞煎至一盞去柤稍熱服之食前潤腸丸治飲食勞倦大便袐澀乾燥閉塞不通全不思食乃風結血結皆能閉塞也潤燥和血踈風自然通利也大黄去皮當歸梢𦍑活已上各五錢桃仁湯浸去錢皮尖一麻子仁去皮取仁一兩二錢五分右除麻仁另研如泥外搗羅為細末煉蜜為丸如梧桐子大毎服五十丸空心用白湯送下𨗳氣除燥湯治飲食勞倦而小便閉塞不通乃血澀致氣不通而竅澀也滑石炒黄茯苓去皮已上各二錢知毋細剉酒洗澤㵼已上各三錢黄蘖去皮四錢酒洗右㕮咀毎服半兩水二盞煎至一盞去柤稍熱服空心如急不拘時候丁香茱萸湯治胃虛嘔噦吐逆膈咽不通乾生薑黄蘖已上各二分丁香炙甘草柴胡橘皮半夏已上各五分升麻七分吳茱茰草豆􅅳黄蓍人參已上各一錢當歸身一錢五分蒼术二錢右件剉如麻豆大毎服半兩水二盞煎至一盞去柤稍熱食前忌冷物草豆蔲丸治脾胃虛而心火乗之不能滋榮上焦元氣遇冬腎與膀胱之寒水旺時子能令母實致肺金大腸相輔而來尅心乗脾胃此大復其讐也經云大勝必大復故皮毛血脉分肉之間元氣已絶於外又大寒大燥二氣倂乗之則苦惡風寒耳鳴及腰背相引胷中而痛鼻息不通不聞香臭額寒腦痛目時眩目不欲開腹中為寒水反乗痰唾沃沫食入反出常痛及心胃痛脇下急縮有時而痛腹不能努大便多㵼而少袐下氣不絶或腸鳴此脾胃虛之極也胷中氣亂心煩不安而為霍亂之漸膈咽不通噎塞極則有聲喘喝閉塞或日陽中或煖房内稍緩口吸風寒則復作四肢厥逆身體沈重不能轉側頭不可以囬顧小便溲而時躁此藥主秋冬寒涼大復氣之藥也澤㵼一分小便數成半柴胡二分或四分消息脇痛多少用神麴薑黄已上各四分當歸身生甘草熟甘草青皮已上各六分桃仁湯洗去皮尖七分白殭蠶吳茱萸湯洗去苦烈味出乾益智仁黄耆陳皮人參已上各八分半夏一錢湯泡七次草豆蔲仁一錢四分麵褁燒麵熱為度去皮用仁麥蘖麵炒黄一錢五分右件一十八味同為細末桃仁另研如泥再同細末一處研匀湯浸蒸餠為丸如梧桐子大毎服三五十丸熟白湯送下旋斟酌多少神聖復氣湯治復氣乗冬足太陽寒氣足少隂腎水之旺子能令母實手太隂肺實反來侮土火木受邪腰背胷膈閉塞疼痛善􅅉口中涎目中泣鼻中流濁涕不止或如息肉不聞香臭咳𠻳痰沫上熱如火下寒如氷頭陣痛目中流火視物􅍃􅍃耳鳴耳聾頭并口鼻或惡風寒喜日陽夜卧不安常覺痰塞膈咽不通口失味兩脇縮急而痛牙齒動摇不能嚼物隂汗前隂冷行歩欹側起居艱難掌中寒風痺麻木小便數而晝多夜頻而欠氣短喘喝少氣不足以息卒遺失無度婦人白帶隂户中痒痛牽心而痛黧黒失色男子控睪牽心腹隂隂而痛面如赭色食少大小便不調煩心霍亂逆氣裏急而腹皮色白後出餘氣腹不能努或腸鳴膝下筋急脊胛大痛此皆寒水來復火土之讐也黑附子炮製去皮臍乾薑炮為末已上各三分防風剉如豆大郁李仁湯浸去皮泥尖另研如人參已上各五分當歸身酒洗六分半夏湯泡七分升麻剉已上各七分甘草剉藁本已上各八分柴胡剉如豆大𦍑活剉如豆大已上各一錢白葵花五朶去心細剪入右件藥都一服水五盞煎至二盞入橘皮五分草豆蔲仁麵褁燒熟去皮黄耆已上各一錢右件入在内再煎至一盞再入下項藥生地黄二分酒洗黄蘖酒浸黄連酒浸枳殻已上各三分已上四味預一日另用新水浸又以細辛二分川芎細末蔓荆子已上各三分預一日用新水半大盞分作二處浸此三味并黄蘖等煎正藥作一大盞不去柤入此浸者藥再上火煎至一大盞去柤稍熱服空心又能治嚙頰嚙唇嚙舌舌根强硬等證如神忌肉湯宜食肉不􅂇經絡中火邪也大抵腎并膀胱經中有寒元氣不足者皆宜服之脾胃將理法白粥粳米菉豆小豆鹽䜴之類皆淡滲利小便且小便數不可更利況大㵼陽氣反行隂道切禁濕麵如食之覺快勿禁藥中不可服澤㵼猪苓茯苓燈心琥珀通草木通滑石之類皆行隂道而㵼陽道也如渇如小便不利或閉塞不通則服得勿利再服忌大鹹助火邪而㵼腎水真隂及大辛味蒜韭五辣醋大料物官桂乾薑之類皆傷元氣若服升沉之藥先一日將理次日腹空服服畢更宜將理十日先三日尤甚不然則反害也夫諸病四時用藥之法不問所病或温或涼或熱或寒如春時有疾於所用藥内加清涼風藥夏月有疾加大寒之藥秋月有疾加温氣藥冬月有疾加大熱藥是不絶生化之源也錢仲陽醫小兒深得此理内經必先歳氣毋代天和是為至治又曰無違時無伐化又曰無伐生生之氣此皆常道也用藥之法若反其常道而變生異證則從權施治假令病人飲酒或過食寒或過食熱皆可以增病如此則以權衡應變治之權變之藥豈可常用乎攝養忌浴當風汗當風湏以手摩汗孔合方許見風必無中風中寒之疾遇卒風暴寒衣服不能禦者則宜争努周身之氣以當之氣弱不能禦者病如衣薄而氣短則添衣於無風處居止氣尚短則以沸湯一椀熏其口鼻即不短也如衣厚於不通風處居止而氣短則宜減衣摩汗孔令合於漫風處居止如久居髙屋或天寒隂濕所遏令氣短者亦如前法熏之如居周宻小室或大熱而處寒涼氣短則出就風日凡氣短皆宜食滋味陽飲令胃調和或大熱能食而渇喜寒飲當從權以飲之然不可躭嗜如冬寒喜熱物亦依時暫食夜不安寢衾厚熱壅故也當急去之仍拭汗或薄而不安即加之睡自穏也飢而睡不安則宜少食飽而睡不安則少行坐遇天氣變更風寒隂晦宜預避之大抵宜温煖避風寒省語少勞役為上逺欲名與身孰親身與貨孰多以隋候之珠彈千仞之雀世必笑之何取之輕而棄之重耶殘軀六十有五耳目半失於視聽百脉沸騰而煩心身如衆派漂流瞑目則魂如浪去神氣衰於前日飲食減於曩時但應人事病皆彌甚以已之所有豈止隋候之珠哉安於淡薄少思寡欲省語以養氣不妄作勞以養形虛心以維神壽夭得失安之於數得䘮既輕血氣自然諧和邪無所容病安增劇茍能持此亦庶幾於道可謂得其真趣矣省言箴氣乃神之祖精乃氣之子氣者精神之根蔕也大矣哉積氣以成精積精以全神必清必静御之以道可以為天神矣有道者能之予何人哉切宜省言而已脾胃論卷下
