body:
  text: 脾胃論卷上元李杲撰脾胃虛實傳變論五臟别論云胃大腸小腸三焦膀胱此五者天氣之所生也其氣象天故㵼而不藏此受五臟濁氣名曰傳化之府此不能久留輸㵼者也所謂五臟者藏精氣而不㵼也故滿而不能實六腑者傳化物而不藏故實而不能滿所以然者水穀入口則胃實而腸虚食下則腸實而胃虚故曰實而不滿滿而不實也隂陽應象大論云榖氣通於脾六經為川腸胃為海九竅為水注之氣九竅者五臓主之五臓皆得胃氣乃能通利通評虚實論云頭痛耳鳴九竅不利腸胃之所生也胃氣一虚耳目口鼻俱為之病經衇别論云食氣入胃散精於肝滛氣於筋食氣入胃濁氣歸心淫精於衇衇氣流經經氣歸於肺肺朝百衇輸精於皮毛毛衇合精行氣於腑腑精神明留於四臓氣歸於權衡權衡以平氣口成寸以决死生飲入於胃逰溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行合於四時五臓隂陽揆度以為常也又云隂之所生本於五味隂之五宫傷在五味至於五味口嗜而欲食之必自裁制勿使過焉過則傷其正也謹和五味骨正筋柔氣血以流腠理以宻如是則骨氣以精謹道如法是有天命平人氣象論云人以水榖為本故人絶水榖則死脈無胃氣亦死所謂無胃氣者非肝不弦腎不石也歴觀諸萹而叅考之則元氣之充足皆由脾胃之氣無所傷而後乃能滋養元氣若胃氣之本弱飲食自倍則脾胃之氣既傷而元氣亦不能充而諸病之所由生也内經之㫖皎如日星猶恐後人有所未逹故靈樞經中復申其説經云水榖入口其味有五各注其海津液各走其道胃者水榖之海其輸上在氣衝下至三里水榖之海有餘則腹滿水榖之海不足則飢不受榖食人之受氣者榖也榖之所注者胃也胃者水榖血氣之海也海之所行雲氣者天下也胃之所出氣血者經隧也經隧者五臟六腑之大絡也又云五榖入於胃也其糟粕津液宗氣分為三隧故宗氣原於胸中出於喉嚨以貫心肺而行呼吸焉榮氣者必津液注之於脈化而為血以榮四末内注五臟六腑以應刻數焉衛者出其悍氣之剽疾而行於四末分肉皮膚之間而不休者也又云中焦之所出亦並胃中出上焦之後此所受氣者泌糟粕蒸津液化為精㣲上注於肺脉乃化而為血以奉生身莫貴於此聖人諄復其辭而不惮其煩者仁天下後世之心亦惓惓矣故夫飲食失節寒温不適脾胃乃傷此固喜怒憂恐損耗元氣資助心火火與元氣不两立火勝則乗其土位此所以病也調經萹云病生隂者得之飲食居處隂陽喜怒又曰隂虚則内熱有所勞倦形氣衰少榖氣不盛上焦不行下脘不通胃氣熱熱氣熏胸中故為内熱脾胃一傷五亂互作其始病痛身壮熱頭痛目眩肢體沈重四肢不收怠惰嗜卧為熱所傷元氣不能運用故四肢困怠如此聖人著之於經謂人以胃土為本成文演義互相發明不一而止麤工不解讀妄意施用本以活人反以害人今舉經中言病從脾胃所生及養生當實元氣者條陳之生氣通天論云蒼天之氣清淨則志意治順之則陽氣固雖有賊邪弗能害也此因時之序故聖人傳精神服天氣而通神明失之内閉九竅外壅肌肉衛氣散解此謂自傷氣之削也陽氣者煩勞則張精絶辟積於夏使人煎厥目盲耳閉潰潰乎若壊都故蒼天之氣貴清淨陽氣惡煩勞病從脾胃生者一也五常政大論云隂精所奉其人夀陽精所降其人夭隂精所奉謂脾胃既和糓氣上升春夏令行故其人夀陽精所降謂脾胃不和􅂖氣下流收蔵令行故其人夭病從脾胃生者二也六節蔵象論云脾胃大腸小腸三焦膀胱者倉廪之本榮之居也名曰噐能化糟粕轉味而入出者也其華在唇四白其充在肌其味甘其色黄此至隂之類通於土氣凡十一臓皆取决於膽也膽者少陽春升之氣春氣升則萬化安故膽氣春升則餘臟從之膽氣不升則餐泄腸澼不一而起矣病從脾胃生者三也經云天食人以五氣地食人以五味五味入鼻蔵於心肺上使五色修明音聲能彰五味入口蔵於腸胃味有所藏以養五氣氣和而生津液相成神乃自生此謂之氣者上焦開發宣五糓味熏膚使身澤毛若霧露之溉氣或乖錯人何以生病從脾胃生者四也豈特四者至於經論天地之邪氣感則害人五臓六腑乃形氣俱虚及受外邪不因虚邪賊邪不能獨傷人諸病從脾胃而生明矣聖人㫖意重見叠出詳盡如此且垂戒云法於隂陽和於術數食飲有節起居有常不妄作勞故能形與神俱而盡終其天年度百嵗乃去由是言之飲食起居之際可不慎哉藏氣法時升降浮沉補㵼之圖五行相生木火土金水循環無端惟脾無正形於四季之末各旺一十八日以生四臟四季者辰戌丑未是也人身形以應九野左足主立春丑位是也左手主立夏辰位是也右手主立秋未位是也右足主立冬戌位是也戊土其本氣平其兼氣温凉寒熱在人以胃應之巳土其本味鹹其兼味辛甘酸苦在人以脾應之脾胃兼化其病治之其從其宜不可定體肝肺之病在水火之間逆順𫝊變不同温凉不定當求責耳脾胃勝衰論胃中元氣盛則能食而不傷過時而不飢脾胃俱旺則能食而肥脾胃俱虛則不能食而瘦或少食而肥雖肥而四肢不舉盖脾實而邪氣盛也又有善食而瘦者胃伏火邪於氣分則能食脾虗則肌肉削即食㑊也叔和云多食亦肌虛此之謂也夫飲食不節則胃病胃病則氣短精神少而生大熱有時而顯火上行獨燎其面黄帝鍼經云面熱者足陽明病胃既病則脾無所禀受脾為死隂不主時也故亦從而病焉形體勞役則脾病病脾則怠惰嗜卧四肢不收大便泄瀉脾既病則與胃不能行津液故亦從而病焉大抵脾胃虛弱陽氣不能生長是春夏之令不行五臟之氣不生脾病則下流乗腎土尅水則骨乏無力是為骨蝕令人骨髓空虛足不能履地是隂氣重疊此隂盛陽虛之證大法云汗之則愈下之則死若用辛甘之藥滋胃當升當浮使生長之氣旺言其汗者非正發汗也為助陽也夫胃病其脉緩脾病其脉遲且其人當臍有動氣按之牢若痛若火乗土位其脉洪緩更有身熱心中不便之證此陽氣衰弱不能生發不當於五臓中用藥法治之當從蔵氣法時論中升降浮沈補瀉法用藥耳如脉緩病怠惰嗜卧四肢不收或大便泄瀉此濕勝從平胃散若脉弦氣弱自汗四肢發熱或大便痛瀉或皮毛枯槁髪脱落從黄耆建中湯脉虛而血弱於四物湯中摘一味或二味以本顯證中加之或真氣虚弱及氣短脉弱從四君子湯或渴或小便閉澀赤黄多少從五苓散去桂摘一二味加正藥中巳上五藥當於本證中隨所兼見證加減假令表虚自汗春夏加黃耆秋冬加桂如腹中急縮或脉弦加防風急甚加甘草腹中窄狹或氣短者亦加之腹滿氣不轉者勿加雖氣不轉而脾胃中氣不和者勿去但加厚朴以破滯氣然亦不可多用於甘草五分中加一分可也腹中夯悶此非腹脹乃散而不收可加芍藥收之如肺氣短促或不足者加人參白芍藥則脾中升陽使肝膽之邪不敢犯也腹中窄狹及縮急者去之及諸酸澀藥亦不可用腹中痛者加甘草白芍藥稼穡作甘甘者巳也曲直作酸酸者甲也甲巳化土此仲景妙法也腹痛兼發熱加黃苓惡寒或腹中覺寒加桂怠惰嗜臥有濕胃虚不能食或沈困或泄瀉加蒼术自汗加白术小便不利加茯苓渴亦加之氣弱者加白茯苓人參氣盛者加赤茯苓縮砂仁氣復不能轉運有熱者㣲加黃連心煩亂亦如之小便少者加猪苓澤瀉汗多津液竭於上勿加之是津液還入胃中􅁒自行也不渇而小便常常閉塞不通加炒黃蘖知母小便澀者加炒滑石小便淋澀者加澤瀉且五苓散治渴而小便不利無惡寒者不得用桂不渴而小便自利妄見妄聞乃瘀血證用炒黃蘖知母以除腎中燥熱竅不利而淋加澤瀉炒滑石只治竅不利者六一散中加木通亦可心臓熱者用錢氏方中𨗳赤散中滿或但腹脹者加厚朴氣不順加橘皮氣滯加青皮一橘皮三氣小便利者四君子湯中去茯苓加黃耆以補之如腹中氣不轉者更加甘草一半腹中刺痛或周身刺痛者或裏急者腹中不寛快是也或虚坐而大便不得者皆血虚也血虚則裏急或血氣虛弱而目睛痛者皆加當歸身頭痛者加川芎苦頭痛加細辛此少隂頭痛也髪脱落及臍下痛加熟地黃予平昔調理脾胃虛弱於此五藥中加減如五臓證中互顯一二證各對證加藥無不騐然終不能使人完復後或有因而再至者亦由督任衝三脉為邪皆胃氣虚弱之所致也法雖依證加減執方療病不依素問法度耳是以檢討素問難經及黃帝鍼經中說脾胃不足之源乃𢃄氣不足隂氣有餘當從六氣不足升降浮沈法隨證用藥治之葢脾胃不足不同餘臓無定體故也其治肝心肺腎有餘不足或補或瀉惟益脾胃之藥為切經言至而不至是為不及所勝妄行所生受病所不勝乗之也至而不至者謂從後來者為虚邪心與小腸來乗脾胃也脾胃脉中見浮大而弦其病或煩燥悶亂或四肢發熱或口苦舌乾咽乾葢心主火小腸主熱火熱來乗土位乃濕熱相合故煩燥悶亂也四肢者脾胃也火乗之故四肢發熱也飲食不節勞役所傷以致脾胃虛弱乃血所生病主口中津液不行故口乾咽乾也病人自以為渴醫者治以五苓散謂止渴燥而反加渴燥乃重竭津液以至危亡經云虚則補其母當於心與小腸中以補脾胃之根蔕也甘温之藥為之主以寒苦之藥為之使以酸味為之臣佐以其心苦緩急食酸以收之心火旺則肺金受邪金虛則以酸補之次以甘温及甘寒之劑於脾胃中瀉心火之亢盛是治其本也所勝妄行者言心火旺能令母實母者肝木也肝木旺則挾火勢無所畏懼而妄行也故脾胃先受之或身體沈重走疰疼痛葢濕熱相摶而風熱鬱而不得伸附著於有形也或多怒者風熱下䧟於地中也或目病而生内障者脾褁血胃主血心主脉脉者血之府也或云心主血又云肝主血肝之竅開于目也或妄見妄聞起妄心夜夢亡人四肢滿閉轉筋皆肝木太盛而為邪也或生痿或生痺或生厥或中風或生惡瘡或作腎痿或為上熱下寒為邪不一皆風熱不得升長而木火遏於有形中也所生受病者言肺受土火木之邪而清肅之氣傷或胷滿少氣短氣者肝主諸氣五臓之氣皆不足而陽道不行也或咳𠻳寒熱者濕熱乗其内也所不勝乗之者水乗木之妄行而反來侮土故腎入心為汗入肝為泣入脾為涎入肺為痰為𠻳為涕為􅅉為水出鼻也一説下元土盛尅水致督任衝三脉盛火旺煎熬令水沸騰而乗脾肺故痰涎唾出於口也下行為隂汗為外腎冷為足不任身為脚下隐痛或水附木勢而上為眼澀為眵為冷淚此皆由肺金之虚而寡於畏也夫脾胃不足皆為血病是陽氣不足隂氣有餘故九竅不通諸陽氣根於隂血中隂血受火邪則隂盛隂盛則上乗陽分而陽道不行無生發升騰之氣也夫陽氣走空竅者也隂氣附形質者也如隂氣附於土陽氣升於天則各安其分也今所立方中有辛甘温藥者非獨用也復有甘苦大寒之劑亦非獨用也以火酒二製為之使引苦甘寒藥至頂而復入於腎肝之下此所謂升降浮沈之道自耦而竒竒而全耦者也陽分竒隂分耦瀉隂火以諸風藥升發陽氣以滋肝膽之用是令陽氣生上出於隂分末用辛甘温藥按其升藥使大發散於陽分而令走九竅也經云食入於胃散精於肝滛氣於筋食入於胃濁氣歸心滛精於脉脉氣流經經氣歸於肺肺朝百脉輸精於皮毛毛脉合精行氣於腑且飲食入胃先行陽道而陽氣升浮也浮者陽氣散滿皮毛升者充塞頭頂則九竅通利也若飲食不節損其胃氣不能剋化散於肝歸於心溢於肺食入則昏冐欲睡得卧則食在一邉氣暫得舒是知升發之氣不行者此也經云飲入於胃遊溢精氣上輸于脾脾氣散精上歸於肺病人飲入胃遽覺至臍下便欲小便由精氣不輸於脾不歸於肺則心火上攻使口燥咽乾是隂氣大盛其理甚易知也况脾胃病則當臍有動氣按之牢若痛有是者乃脾胃虚無是則非也亦可作明辨矣脾胃不足是火不能生土而反抗拒此至而不至是為不及也白术君人參臣甘草佐芍藥佐黃連使黃耆臣桑白皮使諸風藥皆是風能勝濕也及諸甘温藥亦可心火亢盛乗於脾胃之位亦至而不至是為不及也黄連君黃蘖臣生地黃臣芍藥佐石膏佐知母佐黄芩佐甘草使肝木妄行胷脇痛口苦舌乾徃來寒熱而嘔多怒四肢滿閉淋溲便難轉筋腹中急痛此所不勝乗之也羗活佐防風臣升麻使柴胡君獨活佐芍藥臣甘草臣白术佐茯苓佐猪苓澤瀉佐肉桂臣藁本川芎細辛蔓荆子白芷石膏黃蘖佐知母滑石肺金受邪由脾胃虚弱不能生肺乃所生受病也故咳𠻳氣短氣上皮毛不能禦寒精神少而渴情􅆭􅆭而不樂皆陽氣不足隂氣有餘而用不足也人參佐白术佐白芍藥佐橘皮臣青皮以破滯氣黃耆臣桂枝佐桔梗引用桑白皮佐甘草諸酸之藥皆可木香佐㯽榔五味子佐此三味除客氣腎水反來侮土所勝者妄行也作涎及清涕唾多溺多而惡寒者是也土火復之及三脉為邪則足不任身足下痛不能踐地骨乏無力喜睡兩丸冷腹隂隂而痛妄聞妄見腰􅆃背脾皆痛乾薑君白术臣蒼术佐附子佐炮少許肉桂去皮少許川烏頭臣茯苓佐澤瀉使猪苓佐夫飲食入胃陽氣上行津液與氣入於心貫於肺充實皮毛散於百脉脾禀氣於胃而澆灌四旁榮飬氣血者也今飲食損胃勞倦傷脾脾胃虚則火邪乗之而生大熱當先於心分補脾之源葢土生於火兼於脾胃中瀉火之亢甚是先治其標後治其本也且濕熱相合陽氣日以虚陽氣虛則不能上升而脾胃之氣下流併於腎肝是有秋冬而無春夏春主升夏主浮在人則肝心應之弱則隂氣盛故陽氣不得營經云陽本根於隂惟瀉隂中之火味薄風藥升發以伸陽氣則隂氣不病陽氣生矣傳曰履端於始序則不愆正謂此也四氣調神大論云天明則日月不明邪害空竅者陽氣者閉塞地氣者冐明雲霧不精則上應白露不下在人則縁胃虚以火乗之脾為勞􅌒所傷勞則氣耗而心火熾動血脉沸騰則血病而陽氣不治隂火乃獨炎上而走於空竅以至燎於周身反用熱藥以燥脾胃則謬之謬也胃乃脾之剛脾乃胃之柔表裏之謂也飲食不節則胃先病脾無所禀而後病勞倦則脾先病不能為胃行氣而後病其所生病之先後雖異所受邪則一也胃為十二經之海十二經皆禀血氣滋養於身脾受胃之禀行其氣血也脾胃既虚十二經之邪不一而出假令不能食而肌肉削乃本病也其右關脉緩而弱本脉也而本部本證脉中兼見弦脉或見四肢滿閉淋溲便難轉筋一二證此肝之脾胃病也當於本經藥中加風藥以瀉之本部本證脉中兼見浮澀或見氣短氣上喘咳痰盛皮澀一二證此肺之脾胃病也當於本經藥中兼瀉肺之體及補氣之藥本部本證脉中兼見沈細或見善恐欠之證此腎之脾胃病也當於本經藥中加瀉腎水之浮及瀉隂火伏熾之藥經云病有逆從治有反正除四反治法不湏論之其下云惟有陽明厥隂不從標本從乎中其注者以陽明在上中見太隂厥隂在上中見少陽為說予獨謂不然此中非中外之中也亦非上中之中也乃不定之辭蓋欲人臨病消息酌中用藥耳以手足陽明厥隂者中氣也在卯酉之分天地之門户也春分秋分以分隂分陽也中有水火之分者也况手厥隂為十二經之領袖主生化之源足陽明為十二經之海主經營之氣諸經皆禀之言陽明厥隂與何經相併而為病酌中以用藥如權之在衡在兩則有在兩之中在斤則有在斤之中也所以言此者發明脾胃之病不可一例而推之不可一途而取之欲人知百病皆由脾胃衰而生也毫釐之失則灾害立生假如時在長夏於長夏之令中立方謂正當主氣衰而客氣旺之時也後之處方者當從此法加時令藥名曰補脾胃㵼隂火升陽湯補脾胃瀉隂火升陽湯柴胡壹兩五錢甘草炙黄茋臣蒼术泔浸去黑皮切作片子日曝乾剉碎炒𦍑活巳上各一兩升麻八錢人參臣黄芩巳上各七錢黄連去鬚酒製五錢炒為臣為佐石膏少許長夏微用過時去之從權右件㕮咀每服三錢木二盞煎至一盞去柤大温服早飯午後飯前間日服服藥之時宜減食宜美食服藥訖忌語話一二時辰許及酒濕麵大料物之類恐大濕熱之物復助火邪而愈損元氣也亦忌冷水及寒涼淡滲之物及諸果恐陽氣不能生旺也宜温食及薄滋味以助陽氣大抵此法此藥欲令陽氣升浮耳若滲泄淡味皆為滋隂之味為大禁也雖然亦有從權而用之者如見腎火旺及督任衝三脉盛則用黄蘖知母酒洗訖火炒製加之若分兩則臨病斟酌不可久服恐助隂氣而為害也小便赤或澀當利之大便澀當行之此亦從權也得利則勿再服此雖立食禁法若可食之物一切禁之則胃氣失所養也亦當從權而食之以滋胃也肺之脾胃虛論脾胃之虛怠惰嗜卧四肢不收時值秋燥令行濕熱少退體重節痛口苦舌乾食無味大便不調小便頻數且不嗜食食不消兼見肺病洒淅惡寒慘慘不樂面色惡而不和乃陽氣不伸故也當升陽益胃名之曰升陽益胃湯升陽益胃湯黄耆二兩半夏湯洗此一味脉澀者宜用人參去蘆甘草炙巳上各一兩防風以其秋旺故以辛温瀉之白芍藥𦍑活獨活巳上各五錢橘皮不去穰四錢茯苓小便利不渇者勿用澤瀉不淋勿用柴胡白术巳上各三錢黄連二錢何故秋旺用人參白术芍藥之類反補肺為脾胃虛則肺最受病故因時而補易為力也右㕮咀每服三錢生薑五片棗二枚去核水三盞同煎至一盞去柤温服早飯午飯之間服之禁忌如前其藥漸加至五錢止服藥後如小便罷而病加増劇是不宜利小便當少去茯苓澤瀉若喜食初一二日不可飽食恐胃再傷以藥力尚少胃氣不得轉運升發也湏薄滋味之食或美食助其藥力益升浮之氣而滋其胃氣也慎不可淡食以損藥力而助邪氣之降沈也可以小役形體使胃與藥得轉運升發慎勿大勞役使復傷若脾胃得安静尤佳若胃氣少覺强壯少食果以助糓藥之力經云五榖為養五果為助者也君臣佐使法至真要大藥云有毒無毒所治為主主病者為君佐君者為臣應臣者為使一法力大者為君凡藥之所用皆以氣味為主補瀉在味隨時換氣氣薄者為陽中之隂氣厚者為陽中之陽味薄者為隂中之陽味厚者為隂中之隂辛甘淡中熱者為陽中之陽辛甘淡中寒者為陽中之隂酸苦鹹之寒者為隂中之隂酸苦鹹之熱者為隂中之陽夫辛甘淡酸苦鹹乃味之隂陽又為地之隂陽也温涼寒熱乃氣之隂陽又為天之隂陽也氣味升沉而隂陽造化之機存焉一物之内氣味兼有一藥之中理性具焉主對治療由是而出假令治表實麻黄葛根表虛桂枝黄耆裏實枳實大黄裏虛人參芍藥熱者黄芩黄連寒者乾薑附子之類為君君藥分兩最多臣藥次之使藥又次之不可令臣過於君君臣有序相與宣攝則可以禦邪除病矣如傷寒論云陽脉澀隂脉弦法當腹中急痛以芍藥之酸於土中瀉木為君飴糖炙甘草甘温補脾養胃為臣水挾木勢亦來侮土故脉弦而腹痛肉桂大辛熱佐芍藥以退寒水薑棗甘辛温發散陽氣行於經脉皮毛為使建中之名於此見焉有緩急收散升降浮沉澀滑之類非一從權立法于後如皮毛肌肉之不伸無大熱不能食而渇者加葛根五錢躁熱及胃氣上衝為衝脉所逆或作逆氣而裏急者加炒黄芩如胷中結滯氣澀或有熱病者亦各加之如食少而小便少者津液不足也勿利之益氣補胃自行矣如氣弱氣短者加人參只升陽之劑助陽尤勝加人參惡熱發熱而躁渴脉洪大白虎湯主之或喘者加人參如渴不止寒水石石膏各等分少少與之即錢氏方中甘露散主身大熱而小便數或上飲下溲此燥熱也氣燥加白葵花血燥加赤葵花如脉弦只加風藥不可用五苓散如小便行病増者此内燥津液不能停當致津液加炒黄栢赤葵花如心下痞悶者加黄連一黄芩五減諸甘藥不能食心下輭而痞者甘草瀉心湯則愈痞有九種治有仲景湯五方瀉心湯如喘滿者加炙厚朴小便不利者加之小便利為禁藥也如胃虛弱而痞者如甘草如喘而小便不利者加苦葶藶如氣短氣弱而腹㣲滿者不去人參去甘草加厚朴然不若苦味泄之而不令大便行如腹㣲滿而氣不轉加之中滿者去甘草倍黄連加黄蘖更加三味五苓散少許此病雖宜升宜汗如汗多亡陽加黄耆四肢煩熱肌熱與𦍑活柴胡升麻葛根甘草則愈如鼻流清涕惡風或項背脊背强痛𦍑活防風甘草等分黄耆加倍臨卧服之如有大熱脉洪大加苦寒劑而熱不退者加石膏如脾胃中熱加炒黄連甘草凡治此病脉數者當用黄蘖或少加黄連以柴胡蒼术黄耆甘草更加升麻得汗出則脉必下乃火鬱則發之也如證退而脉數不退不洪大而疾有力者多減苦藥加石膏如大便輭或泄者加桔梗食後服之此藥若誤用則其害非細用者當斟酌旋旋加之如食少者不可用石膏石膏善能去脉數疾病退脉數不退者不可治也如不大渴亦不可用如脉弦而數者此隂氣也風藥升陽以發火鬱則脉數峻退矣已上五法加減未盡特以明大槩耳分經隨病制方脉經云風寒汗出肩背痛中風小便數而欠者風熱乘其肺使肺氣鬱甚也當瀉風熱以通氣防風湯主之通氣防風湯柴胡升麻黄耆已上各五分𦍑活防風橘皮人參甘草已上各五分藁本三分青皮白豆䓻仁黄蘖已上各二分右㕮咀都作一服水二大盞煎至一盞去柤温服食後氣盛者宜服面白脫色氣短者勿服如小便遺失者肺氣虛也宜安卧養氣禁勞役以黄耆人參之類補之不愈當責有熱加黄蘖生地黄如肩背痛不可囬顧此手太陽氣鬱而不行以風藥散之如脊痛項强腰似折項似㧞上衝頭痛者乃足太陽經之不行也以羗活勝濕湯主之羗活勝濕湯羗活獨活已上各一錢甘草炙藁本防風已上各五分蔓荆子三分川芎二分右件㕮咀都作一服水二盞去柤温服食後如身重腰沈沈然乃經中有濕熱也更加黄蘖一錢附子半錢蒼术二錢如腿脚沈重無力者加酒洗漢防己半錢輕則附子重則川烏頭少許以為引用而行經也如卧而多驚小便淋溲者邪在少陽厥隂亦用太陽經藥更加柴胡半錢如淋加澤㵼半錢此下焦風寒二經合病也經云腎肝之病同一治為俱在下焦非風藥行經不可也如大便後有白膿或只便白膿者因勞役氣虛傷大腸也以黄耆人參湯補之如裏急頻見者血虚也更加當歸如肺脹膨膨而喘咳胸髙氣滿壅盛而上奔者多加五味子人參次之麥門冬又次之黄連少許如甚則交兩手而瞀者真氣太虛也若氣短加黄耆五味子人參氣盛加五味子人參黄芩荆芥穗加草豆蔲仁如嗌痛頷腫脉洪大面赤者加黄芩桔梗甘草各五分如耳鳴目黄頷頤腫頸有臑肘臂外後腫痛面赤脉洪大者以羗活防風甘草藁本通其經血加黄芩黄連消其腫以人參黄耆益其元氣而㵼其火邪如脉𦂳者寒也或面白善􅅉或面色惡皆寒也亦加羗活等四味當㵼足太陽不用黄芩少加附子以通其脉面色惡多悲恐者更加桂附如便白膿少有滑頻見汙衣者氣脫加附子皮甚則加米殻如氣澀者只以甘藥補氣安卧不語以養其氣用藥宜禁論凡治病服藥必知時禁經禁病禁藥禁夫時禁者必本四時升降之理汗下吐利之宜大法春宜吐象萬物之發生耕耨科斫使陽氣之鬱者易逹也夏宜汗象萬物之浮而有餘也秋宜下象萬物之收成推陳致新而使陽氣易收也冬周宻象萬物之閉藏使陽氣不動也夫四時隂陽者與萬物沉浮於生長之門逆其根伐其本壊其真矣又云用濕逺濕用熱逺熱用寒逺寒無異其勝也故冬不用白虎夏不用青龍春夏不服桂枝秋冬不服麻黄不失氣宜如春夏而下秋冬而汗是失天信伐天和也有病則從權過則更之經禁者足太陽膀胱經為諸陽之首行於背表之表風寒所傷則宜汗傳入本則宜利小便若下之太早必變證百出此一禁也足陽明胃經行身之前主腹滿脹大便難宜下之蓋陽明化燥火津液不能停禁發汗利小便為重損津液此二禁也足少陽膽經行身之側在太陽陽明之間病則徃來寒熱口苦胷脇痛袛宜和解且膽者無出無入又主發生之氣下則犯太陽汗則犯陽明利小便則使生發之氣反陷入隂中此三禁也三隂非胃實不當下為三隂無傳本湏胃實得下也分經用藥有所據焉病禁者如陽氣不足隂氣有餘之病則凡飲食及藥忌助隂㵼陽諸淡食及淡味之藥㵼升發以助收斂也諸苦藥皆沈㵼陽氣之散浮諸薑附官桂辛熱之藥及濕麵酒大料物之類助火而㵼元氣生冷硬物損陽氣皆所當禁也如隂火欲衰而退以三焦元氣未盛必口淡淡如鹹物亦所當禁藥禁者如胃氣不行内亡津液而乾涸求湯飲以自救非渴也乃口乾也非濕勝也乃血病也當以辛酸益之而淡滲五苓之類則所當禁也汗多禁利小便小便多禁發汗咽痛禁發汗利小便若大便快利不得更利大便袐澀以當歸桃仁麻子仁郁李仁皂角仁和血潤腸如燥藥則所當禁者吐多不得復吐如吐而大便虛輭者此上氣壅滯以薑橘之屬宣之吐而大便不通則利大便上藥則所當禁也諸病惡瘡及小兒㿀後大便實者亦當下之而薑橘之類則所當禁也又如脉弦而服平胃散脉緩而服黄耆建中湯乃實實虛虛皆所當禁也人禀天之濕化而生胃也胃之與濕其名雖二其實一也濕能滋養於胃胃濕有餘亦當㵼濕之太過也胃之不足惟濕物能滋養仲景云胃勝思湯餅而胃虛食湯餅者徃徃増劇濕能助火火旺鬱而不通主火熱初病火旺不可食以助火也察其時辨其經審其病而後用藥四者不失其宜則善矣著論處方已詳矣然恐或者不知其源而無所考㨿復以黄帝内經仲景所説脾胃者列于左太隂陽明論云太隂陽明為表裏脾胃脉也生病而異者何也岐伯曰隂陽異位更虛更實更逆更從或從内或從外所從不同故病異名也帝曰願聞其異狀也岐伯曰陽者天氣也主外隂者地氣也主内故陽道實隂道虛故犯賊風虛邪者陽受之食飲不節起居不時者隂受之陽受之則入六腑隂受之則入五臟入六腑則身熱不得卧上為喘呼入五臟則䐜滿閉塞下為餐泄乆為腸澼故喉主天氣咽主地氣故陽受風氣隂受濕氣隂氣從足上行至頭而下行循臂至指端陽氣從手上行至頭而下行至足故曰陽病者上行極而下隂病者下行極而上故傷於風者上先受之傷於濕者下先受之帝曰脾病而四肢不用何也岐伯曰四肢皆禀氣於胃而不得至經必因於脾乃得禀也今脾病不能為胃行其精液四肢不得禀水榖氣日以衰脉道不利筋骨肌肉皆無氣以生故不用焉帝曰脾不主時何也岐伯曰脾者土也治中央常以四時長四臟各十八日寄治不得獨主於時也脾臟者常著胃土之精也土者生萬物而法天地故上下至頭足不得主時也隂陽應象論曰人有五臟化五氣以生喜怒悲憂恐故喜怒傷氣寒暑傷形暴怒傷隂暴喜傷陽厥氣上行滿脉去形喜怒不節寒暑過度生乃不固玉機真臟論曰脾太過則令人四肢不舉其不及則令人九竅不通名曰重强又通評虛實論曰頭痛耳鳴九竅不利腸胃之所生也調經論曰形有餘則腹脹涇溲不利不足則四肢不用又氣交變論曰歳上太過雨濕流行腎水受邪民病腹痛清厥意不樂體重煩寃甚則肌肉萎足痿不收行善瘈脚下痛飲發中滿食減四肢不舉又云歳土不及風乃大行霍亂體重腹痛筋骨繇復肌肉瞤酸善怒又云咸病寒中復則枚政嚴峻胷脇暴痛下引少腹善太息蟲食引黄氣客於脾民食少失味又云土不及四維有埃雲潤澤之化則春有鳴條鼔拆之政四維發振拉飄騰之變則秋有肅殺霖滛之復其𤯝四維其臟脾其病内舍心腹外在肌肉四肢五常政大論土平曰備化不及曰卑監又云其動􅅑涌分潰壅腫其發濡滯其病留滿痞塞從木化也其病餐泄又云土太過曰敦阜其味甘酸其象長夏其經足太隂陽明又曰其病腹滿四肢不舉邪傷脾也經脉别論云太隂藏搏者用心省真五臟氣少胃氣不平五隂也宜治其下俞補陽㵼隂藏氣法時論云脾主長夏足太隂陽明主治其日戊巳脾苦濕急食苦以燥之又云病在脾愈在秋秋不愈甚於春春不死持於夏起於長夏禁温食飽食濕地濡衣脾病者愈在庚辛庚辛不愈加於甲乙甲乙不死持於丙丁起於戊巳脾病者日昳慧日出甚下晡静脾欲緩急食甘以緩之用苦㵼之甘補之又云脾病者身重善飢肉痿足不收行善瘈脚下痛虛則腹滿腸鳴餐泄食不化取其經太隂陽明少隂血者經脉别論食氣入胃散精於肝􅁋氣於筋食氣入胃濁氣歸心􅁋精於脉脉氣流經經氣歸於肺肺朝百脈輸精於皮毛毛脉合精行氣於腑腑精神明留於四臟氣歸於權衡權衡以平氣口成寸以决死生飲入於胃逰溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行合於四時五臟隂陽揆度以為常也五常政大論有太過不及太過者薄所不勝乗所勝也不及者至而不至是為不及所勝妄行所生受病所不勝者乘之也仲景云人受氣於水榖以養神水糓盡而神去故云安糓則昌絶糓則亡水去則榮散糓消則衞亡榮散衞亡神無所依又云水入於經其血乃成糓入於胃脉道乃行故血不可不養衞不可不温血温衞和得盡天年脾胃論卷上
