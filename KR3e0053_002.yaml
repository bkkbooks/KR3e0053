body:
  text: 脾胃論卷中元李杲撰氣運衰旺圖說天地互為體用四說察病神機濕胃化熱小腸長風膽生皆陷下不足先補則黃耆人參甘草當歸身柴胡升麻乃辛甘發散以助春夏生長之用也土脾形火心神木肝血皆大盛上乘生長之氣後㵼則甘草梢子之甘寒㵼火形於肺逆於胸中傷氣者也黃芩之苦寒以泄胸中之熱喘氣上奔者也紅花以破惡血已用黃芩大補腎水益肺之氣㵼血中火燥者也寒膀胱藏氣燥大腸收氣皆大旺後㵼則黃耆之甘溫止自汗實表虛使不受寒邪當歸之辛溫能潤燥更加桃仁以通幽門閉塞利其隂路除大便之難燥者也水腎精金肺氣皆虛衰不足先補則黃蘗之苦寒除濕熱為痿乘於腎救足膝無力亦除隂汗隂痿而益精甘草梢子黃芩補肺氣泄隂火之下行肺苦氣上逆急食苦以泄之也此初受熱中常治之法也非權也權者臨病制宜之謂也常道病則反常矣春夏乃天之用也是地之體也秋冬乃天之體也是地之用也此天地之常道既病反常也春夏天之用人亦應之食罷四肢蹻健精氣神皆出九竅通利是也口鼻氣息自不聞其音語聲清音如鐘春夏地之體人亦應之食罷皮肉筯骨血脉皆滑利屈伸柔和而骨剛力盛用力不乏飲食勞倦所傷始為熱中論古之至人窮於隂陽之化究乎生死之際所著內外經悉言人以胃氣為本蓋人受水穀之氣以生所謂清氣榮氣運氣衛氣春升之氣皆胃氣之别稱也人胃為水榖之海飲食入胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行合於四時五臟隂陽揆度以為常也若飲食失節寒溫不適則脾胃乃傷喜怒憂恐損耗元氣既脾胃氣衰元氣不足而心火獨盛心火者隂火也起於下焦其系繫於心心不主令相火代之相火下焦包絡之火元氣之賊也火與元氣不兩立一勝則一負脾胃氣虛則下流於腎隂火得以乘其土位故脾證始得則氣髙而喘身熱而煩其脉洪大而頭痛或渴不止其皮膚不任風寒而生寒熱蓋隂火上衝則氣髙喘而煩熱為頭痛為渴而脉洪脾胃之氣下流使榖氣不得升浮是春生之令不行則無陽以護其榮衛則不任風寒乃生寒熱此皆脾胃之氣不足所致也然而與外感風寒所得之證頗同而實異內傷脾胃乃傷其氣外感風寒乃傷其形傷其外為有餘有餘者瀉之傷其內為不足不足者補之內傷不足之病茍誤認作外感有餘之病而反㵼之則虛其虛也實實虛虛如此死者醫殺之耳然則奈何惟當以辛甘溫之劑補其中而升其陽甘寒以㵼其火則愈矣經曰勞者溫之損者溫之又云溫能除大熱大忌苦寒之藥損其脾胃脾胃之證始得則熱中今立治始得之證補中益氣湯黃耆病甚勞役熱甚者一錢甘草已上各五分炙人參去蘆三分有嗽去之已上三味除濕熱煩熱之聖藥也當歸身二分酒焙乾或日乾以和血脉橘皮不去白二分或三分以導氣又能益元氣得論甘藥乃可若獨用㵼脾胃升麻二分或三分引胃氣上騰而復其本位便是行春升之今柴胡二分或三分引清氣行少陽之氣上升白术三分除胃中熱利腰脊間血右件藥㕮咀都作一服水二盞煎至一盞量氣弱氣盛臨病斟酌水盞大小去柤食逺稍熱服如傷之重者不過二服而愈若病日久者以權立加減法治之如腹中痛者加白芍藥五分炙甘草三分如惡寒冷痛者加去皮中桂一分或三分桂心是也如惡熱喜寒而腹痛者於己加白芍藥二味中更加生黃芩三分或二分如夏月腹痛而不惡熱者亦然治時熱也如天涼時惡熱而痛於己加白芍藥甘草黃芩中更少加桂如天寒時腹痛去芍藥味酸而寒故也加益智三分或二分或加半夏五分生薑三片如頭痛加蔓荆子二分或三分如痛甚者加川芎二分如頂痛腦痛加藁本三分或五分如苦痛者加細辛二分華陰者諸頭痛者併用此四味足矣如頭上有熱則此不能治别以清空膏主之如臍下痛者加真熟地黃五分其痛立止如不已者乃大寒也更加肉桂去皮二分或三分內經所說少腹痛皆寒證從復法相報中來也經云大勝必大復從熱病中變而作也若傷寒厥隂之證也仲景之抵當湯并九主之乃血結下焦膀胱也如胸中氣壅滯加青皮二分如氣促少氣者去之如身有疼痛者濕若身重者亦濕加去桂五苓散一錢如風濕相搏一身盡痛加羌活防風藁本根已上各五分升麻蒼术已上各一錢勿用五苓所以然者為風藥已能勝濕故别作一服與之如病去勿再服以諸風之藥損人元氣而益其病故也如大便祕澀加當歸梢一錢閉澀不行者煎成正藥先用一口調𤣥明粉五分或一錢得行則止此病不宜下下之恐變凶證也如久病痰嗽者去人參初病者勿去之冬月或春寒或秋涼時各宜加不去根節麻仁如春令大溫只加佛耳草三分欵冬花一分如夏月病嗽加五味子三十二枚麥門冬去心二分或三分如舌上白滑胎者是胸中有寒勿用之如夏月不嗽亦加人參三分或一分并五味子麥門冬各等分救脉受火邪也如病人能食而心下痞加黃連如不能食心下痞勿加黃連如脅下痛或脅下急縮俱加柴胡三分甚則五分右一方加減是飲食勞倦喜怒不節始病熱中則可用之若末𫝊為寒中則不可用也蓋甘酸適足益其病爾如黃耆人參甘草芍藥五味子之類也今詳內經針經熱中寒中之證列于左調經論云血并於陽氣并於隂乃為炅中血并於上氣并於下心煩惋善怒又云其生於隂者得之飲食起居處隂陽喜怒又云有所勞倦形氣衰少榖氣不盛上焦不行下腕不通胃氣熱熱氣熏胸中故曰內熱隂盛生內寒厥氣上逆寒氣積於胸中而不㵼不㵼則濕氣去寒獨留則血凝注血凝注則脉不通其脉盛大以澀故曰寒中先病熱中證者衝脉之火附二隂之裏𫝊之督脉督脉者第二十一椎下長强穴是也與足太陽膀胱寒氣為附經督脉其盛也如巨川之水疾如奔馬其勢不可遏太陽寒氣細細如線逆太陽寒氣上行衝頂入額下鼻尖入手太陽於胸中手太陽者丙熱氣也足膀胱者壬寒氣也壬能尅丙寒熱逆於胸中故脉盛大其手太陽小腸熱氣不能交入膀胱經者故十一經之盛氣積於胸中故其脉盛大其膀胱逆行盛之極子能令毋實手陽明大腸經金即其母也故燥旺其燥氣挾子之勢故脉澀而大便不通以此言脉盛大以澀者手陽明大腸脉也黃帝針經胃病者腹脹胃脘當心而痛上支兩脅膈咽不通飲食不下取三里以補之若見此病中一證皆大寒禁用諸甘酸藥上已明之矣脾胃虛弱隨時為病隨病制方夫脾胃虛弱必上焦之氣不足遇夏天氣熱盛損傷元氣怠惰嗜卧四肢不收精神不足兩腳痿軟遇早晚寒厥日髙之後陽氣將旺復熱如火乃隂陽氣血俱不足故或熱厥而隂虛或寒厥而氣虛口不知味目中溜火而視物昏昏無所見小便頻數大便難而結袐胃脘當心而痛兩脅痛或急縮臍下周圍如繩束之急甚則如刀刺腹難舒伸胸中閉塞時顯嘔噦或有痰嗽口沃白沫舌强腰背脾眼皆痛頭痛時作食不下或食入即飽全不思食自汗尤甚若隂氣覆在皮毛之上皆天氣之熱助本病也乃庚大腸辛肺金為熱所乘而作當先助元氣理治庚辛之不足黃耆人參湯主之黃耆一錢如自汗過多更加一錢升麻六分人參去蘆橘皮不去白麥門冬去心蒼术無汗更加五分白术已上各五分黃蘖酒洗以救水之源炒麴已上各三分當歸身酒洗炙甘草已上各二錢五味子九箇右件同㕮咀都作一服水二盞煎至一盞去柤稍熱服食逺或空心服之忌酒濕麵大料物之類及過食冷物如心下痞悶加黃連二分或三分如胃腕當心痛減大寒藥加草豆䓻仁五分如脅下痛或縮急加柴胡二分或三分如頭痛目中溜火加黃連二分或三分川芎三分如頭痛目不清利上壅上熱加蔓荆子川芎已上各三分藁本生地黃已上各一分細辛一分如氣短精神如夢寐之間困乏無力加五味子九箇如大便澀滯一二日不見者致食少食不下血少血中伏火而不得潤也加當歸身生地黃麻子仁泥已上各五分桃仁三枚湯泡去皮尖另研如大便通行所加之藥勿再服如大便又不快利勿用别藥少加大黃煨五分如不利者非血結血袐而不通也是熱則生風其病人必顯風證單血藥不可復加之止常服黃耆人參湯藥只用羌活防風已上各五錢二味㕮咀以水四盞煎至一盞去柤空心服之其大便必大走也一服便止如胸中氣滯加青皮皮薄清香可愛者一分或二分并去白橘皮倍之去其邪氣此病本元氣不足惟當補元氣不當㵼之如氣滯太甚或補藥太過病人心下有憂滯鬱結之事更加木香縮砂仁已上各三分或二分白豆䓻仁二分與正藥同煎如腹痛不惡寒者加白芍藥五分黃芩二分却减五味子夫脾胃虛弱遇六七月間河漲霖雨諸物皆潤人汗沾衣身重短氣甚則四肢痿軟行步不正腳欹眼黑欲倒此腎水與膀胱俱竭之狀也當急救之滋肺氣以補水之上源又使庚大腸不受邪熱不令汗大泄也汗泄甚則亡津液亡津液則七神無所依經云津液相成神乃自生津者庚大腸所主三伏之義為庚金受囚也若亡津液汗大泄濕令亢甚則清肅之氣亡燥金受囚風木無可以制故風濕相搏骨節煩疼一身盡痛亢則害承乃制是也孫思邈云五月常服五味子是㵼丙火補庚大腸益五臟之元氣壬膀胱之寒已絶於己癸腎水已絶於午今更逢濕旺助熱為邪西方北方之寒清絶矣聖人立法夏月宜補者補天元之真氣非補熱火也令人夏食寒是也為熱傷元氣以人參麥門冬五味子生脉脉者元氣也人參之甘補元氣㵼熱火也麥門冬之苦寒補水之源而清肅燥金也五味子之酸以㵼火補庚大腸與肺金也當此之時無病之人亦或有二證或避暑熱納涼於深堂大厦得之者名曰中暑其病必頭痛惡寒身形拘急肢節疼痛而煩心肌膚大熱無汗為房屋之隂寒所遏使周身陽氣不得伸越世多以大順散主之是也若行人或農夫於日中勞役得之者名曰乍中熱其病必苦頭痛發燥熱惡熱捫之肌膚大熱必大渴引飲汗大泄無氣以動乃為天熱外傷肺氣蒼术白虎湯主之潔古云動而得之為中熱靜而得之為中暑中暑者隂證當發散也中熱者陽證為熱傷元氣非形體受病也若虛損脾胃有宿疾之人遇此天暑將理失所違時伐化必困乏無力懶語氣短氣弱氣促似喘非喘骨節無力其形如夢寐朦朦如煙霧中不知身所有也必大汗泄若風犯汗眼皮膚必搐頂筋皮枯毛焦身體皆重肢節時有煩疼或一身盡痛或渴或不渴或小便黃澀此風濕相摶也頭痛或頭重上墊壅盛口鼻氣短氣促身心煩亂有不生之意情思慘悽此隂勝陽之極也病甚則傳腎肝為痿厥厥者四肢如在火中為熱厥四肢寒冷者為寒厥寒厥則腹中有寒熱厥則腹中有熱為脾主四肢故也若肌肉濡潰痺而不仁傳為肉痿證證中皆有肺疾用藥之人當以此調之氣上衝胸皆厥證也痿者四肢痿軟而無力也其心煩寃不止厥者氣厥也甚則大逆故曰厥逆其厥痿多相須也於前巳立黃耆人參五味子麥門冬湯中每服加白茯苓二分澤㵼四分猪苓白术巳上各一分如小便快利不黃澀者只加澤㵼二分與二术上下分消其濕如行步不正腳膝痿弱兩足欹側者巳中痿邪加酒洗黃蘖知毋三分或五分令二足湧出氣力矣如汗大泄者津脫也急止之加五味子六枚炒黃蘖五分炒知母三分不令妨其食當以意斟酌若妨食則止候食進則再服三里氣街以三稜針出血若汗不减不止者於三里穴下三寸上亷穴出血禁酒濕麵夫痿者濕熱乘腎肝也當急去之不然則下焦元氣竭盡而成軟癱必腰下不能動心煩寃而不止也若身重減氣不短小便如常及濕熱之令退時或所增之病氣退者不用五味子澤㵼茯苓猪苓黃蘖知母蒼术白术之藥只依本病中證候加減常服藥亦須用酒黃蘖二分或三分如更時令清燥之氣大行却加辛溫㵼之若濕氣勝風證不退眩運麻木不巳除風濕羌活湯主之除風濕羌活湯羌活一兩防風去蘆蒼术酒浸去皮黃耆巳上各一錢炙甘草獨活柴胡巳上各五分川芎去頭痛黃蘖橘皮藁本巳上各二分澤㵼猪苓去黑皮茯苓巳上各二分黃連去鬚一分右㕮咀每服稱三錢或五錢水二盞煎至一盞去柤稍熱服量虛實施用如有不盡證候依加減法用之夫脉弦洪緩而沈按之中之下得時一澀其證四肢滿閉肢節煩疼難以屈伸身體沈重煩心不安忽肥忽瘦四肢懶倦口失滋味腹難舒伸大小便清利而數或上飲下便或大便澀滯不行一二日一見夏月餐泄米榖不化或便後見血見白膿胸滿短氣膈咽不通或痰嗽稠粘口中沃沫食入反出耳鳴耳聾目中流火視物昏花弩肉紅絲熱壅頭目不得安卧無力不思飲食調中益氣湯主之調中益氣湯黃耆一錢人參去蘆頭有嗽者去之甘草蒼术已上各五分柴胡一味為上氣不足胃氣與脾氣下溜乃補上氣從陰引陽也橘皮如腹中氣不得運轉更加一分升麻已上各二分木香一分或二分右件銼麻豆大都作一服水二大盞煎至一盞去柤帶熱宿食消盡服之寧心絶思藥必神效蓋病在四肢血脉空腹在旦是也如時顯熱燥是下元隂火蒸蒸發也加真生地黃二分黃蘖二分無此證則去之如大便虛坐不得或大便了而不了腹中常逼迫血虛血澀也加當歸身三分如身體沈重雖小便數多亦加茯苓二分蒼术一錢澤㵼五分黃蘖三分時暫從權而袪濕也不可常用兼足太隂巳病其脉亦絡於心中故顯濕熱相合而煩亂如胃氣不和加湯洗半夏五分生薑三片有嗽加生薑生地黃二分以制半夏之毒如痰厥頭痛非半夏不能除此足太隂脾所作也如兼躁熱加黃蘖生地黃巳上各二分如無巳上證只服前藥右件銼如麻豆都作一服水一大盞去柤帶熱食逺服之如夏月須加白芍藥三分如春月腹中痛尤宜加如惡熱而渴或腹痛者更加芍藥五分生黃芩二分如惡寒腹中痛加中桂三分去黃芩謂之桂枝芍藥湯亦於芍藥湯中加之同煎如冬月腹痛不可用芍藥蓋大寒之藥也只加乾薑二分或加半夏五七分以生薑少許製之如秋冬之月胃脉四道為衝脉所逆并脅下少陽脉二道而反上行病名曰厥逆內經曰逆氣上行滿脈去形明七神昏絶離去其形而死矣其證氣上衝則不得息而喘息有音不得卧加吳茱萸五分或一錢五分湯洗去苦觀厥氣多少而用之如夏月有此證為大熱也蓋此病隨四時為寒熱溫涼也宜以酒黃連酒黃蘖酒知母各七分為細末熟湯為丸梧桐子大每服二百丸白湯送下空心服仍多飲熱湯服畢少時便以美飲食壓之使不令胃中留停直至下元以㵼衝脉之邪也大抵治飲食勞􅌒所得之病乃虛勞七損證也當用溫平甘多辛少之藥治之是其本法也如時上見寒熱病陽證也又或將理不如法或酒食過多或辛熱之食作病或寒冷之食作病或居大熱大寒之處蓋其病當臨時制宜暫用大寒大熱治法而取效此從權也不可以得效之故而久用之必致難治矣黃帝針經云從下上者引而去之上氣不足推而揚之蓋上氣者心肺上焦之氣陽病在隂從隂引陽宜以入腎肝下焦之藥引甘多辛少之藥使升發脾胃之氣又從而去其邪氣於腠理皮毛也又云視前痛者常失取之是先以繆刺㵼其經絡之壅者為血凝而不流故先去之而後治他病長夏濕熱胃困尤甚用清暑益氣湯論刺志論云氣虛身熱得之傷暑熱傷氣故也痿論云有所逺行勞倦逢大熱而渴渴則陽氣內伐內伐則熱舍於腎腎者水臟也今水不能勝火則骨枯而髓虛足不任身發為骨痿故下經曰骨痿者生於大熱也此濕熱成痿令人骨乏無力故治痿獨取於陽明時當夏長濕熱大勝蒸蒸而熾人感之多四肢困倦精神短少懶於動作胸滿氣促肢節沉疼或氣髙而喘身熱而煩心下膨痞小便黃而數大便唐而頻或痢出黃如糜或如泔色或渴或不渴不思飲食自汗體重或汗少者血先病而氣不病也其脉中得洪緩若濕氣相搏必加之以遲遲病雖互換少差其天暑濕令則一也宜以清燥之劑治之內經曰陽氣者衛外而為固也炅則氣泄今暑邪干衛故身熱自汗以黃耆甘溫補之為君人參橘皮當歸甘草甘微溫補中益氣為臣蒼术白术澤㵼滲利而除濕升麻葛根甘苦平善解肌熱又以風勝濕也濕勝則食不消而作痞滿故炒麴甘辛青皮辛溫消食快氣腎惡燥急食辛以潤之故以黃蘖苦辛寒借甘味㵼熱補水虛者滋其化源以人參五味子麥門冬酸甘微寒救天暑之傷於庚金為佐名曰清暑益氣湯清暑益氣湯黃耆汗加減五分蒼术泔浸去皮升麻巳上各一錢人參去蘆澤㵼神麯炒黃橘皮白术已上各五分麥門冬去心當歸身炙甘草巳上各三分青皮去白二分半黃蘖酒洗去皮二分三分葛根二分五味子九枚右件同㕮咀都作一服水二大盞煎至一盞去柤大溫服食逺劑之多少臨病斟酌此病皆由飲食勞倦損其脾胃乘天暑而病作也但藥中犯澤㵼猪苓茯苓燈心通草木通淡滲利小便之類皆從時令之旺氣以㵼脾胃之客邪而補金水之不足也此正方巳是從權而立之若於無時病濕熱脾旺之證或小便巳數腎肝不受邪者誤用之必大㵼真隂竭絶腎水先損其兩目也復立變證加減法于後心火乘脾乃血受火邪而不能升發陽氣復於地中地者人之脾也必用當歸和血少用黃蘖以益真隂脾胃不足之證須少用升麻乃足陽明太隂引經之藥也使行陽道自脾胃中右遷少陽行春令生萬物之根蒂也更少加柴胡使諸經右遷生發隂陽之氣以滋春之和氣也脾虛緣心火亢甚而乘其土也其次肺氣受邪為熱所傷必須用黃耆最多甘草次之人參又次之三者皆甘溫之陽藥也脾始虛肺氣先絶故用黃耆之甘溫以益皮毛之氣而閉腠理不令自汗而損其元氣也上喘氣短懶語須用人參以補之心火乘脾須用炙甘草以㵼火熱而補脾胃中元氣甘草最少恐資滿也若脾胃之急痛并脾胃大虛腹中急縮腹皮急縮者却宜多用之經云急者緩之若從權必加升麻以緩之恐左遷之邪堅盛卒不肯退反致項上及臀尻肉添而反行隂道故使引之以行陽道使精氣之出地右遷而上行以和隂陽之氣也若中滿者去甘草咳甚者去人參如口乾嗌乾者加乾葛脾胃既虛不能升浮為隂火傷其生發之氣榮血大虧榮氣伏於地中隂火熾盛日漸煎熬血氣虧少且心包與心主血血減則心無所養致使心亂而煩病名曰悗悗者心惑而煩悶不安也是清氣不升濁氣不降清濁相干亂於胸中使周身氣血逆行而亂內經云從下上者引而去之故當加辛溫甘溫之劑生陽陽生則隂長巳有甘溫三味之論或曰甘溫何能生血又非血藥也曰仲景之法血虛以人參補之陽旺則能生隂血也更加當歸和血又宜少加黃蘖以救腎水蓋甘寒㵼熱火火減則心氣得平而安也如煩亂猶不能止少加黃連以去之蓋將補腎水使腎水旺而心火自降扶持地中陽氣矣如氣浮心亂則以硃砂安神丸鎮固之得煩減勿再服以防㵼陽氣之反陷也如心下痞亦少加黃連氣亂於胸為清濁相干故以橘皮理之又能助陽氣之升而散滯氣又助諸甘辛為用也長夏濕土客邪大旺可從權加蒼术白术澤㵼上下分消其濕熱之氣也濕氣大勝主食不消化故食減不知穀味加炒麴以消之復加五味子麥門冬人參㵼火益肺氣助秋損也此三伏中長夏正旺之時藥也隨時加減用藥法濁氣在陽亂於胸中則䐜滿閉塞大便不通夏月宜少加酒洗黃蘖末苦寒之味冬月宜加吳茱萸大辛苦熱之藥以從權乃隨時用氣以泄濁氣之不降也借用大寒之氣於甘味中故曰甘寒㵼熱火也亦須用發散寒氣辛溫之劑多黃蘖少也清氣在隂者乃人之脾胃氣衰不能升發陽氣故用升麻柴胡助辛甘之味以引元氣之升不令餐泄也堵塞咽喉陽氣不得出者曰塞隂氣不得下降者曰噎矣噎塞迎逆於咽喉胸膈之間令諸經不行則口開目瞪氣欲絶當先用辛甘氣味俱陽之藥引胃氣以治其本加堵塞之藥以㵼其標也寒月隂氣大助隂邪於外於正藥內加吳茱茰大熱大辛苦之味以㵼隂寒之氣暑月陽盛則於正藥中加青皮陳皮益智黃蘖散寒氣泄隂火之上逆或以消痞丸合滋腎丸滋腎丸者黃蘖知母微加肉桂三味是也或更以黃連别作丸二藥七八十丸空心約宿食消盡服之待少時以美食壓之不令胃中停留也如食少不飢加炒麴如食巳心下痞别服橘皮枳术丸如脉弦四肢滿閉便難而心下痞加甘草黃連柴胡如腹中氣上逆者是衝脉逆也加黃蘖三分黃連一分半以泄之如大便閉燥心下痞加黃連桃仁少加大黃當歸身如心下痞夯悶者加白芍藥黃連如心下痞腹脹加五味子白芍藥縮砂仁如天寒少加乾薑或中桂如心下痞中寒者加附子黃連如心下痞中逆者加黃連生薑橘皮如冬月不加黃連少入丁香藿香葉如口乾嗌乾加五味子葛根如脅下急或痛甚俱加柴胡甘草如胸中滿悶鬱鬱然加橘皮紅青皮木香少許如頭痛有痰沈重懶倦者乃太隂痰厥頭痛加半夏五分生薑二分三分如腹中或周身間有刺痛皆血澀不足加當歸身如噦加五味子多益智少如食不下胸中胃上有寒或氣澀滯加青皮陳皮木香此三味為定法如冬天加益智仁草豆蔲仁如夏月少用更加黃連如秋月氣澀滯食不下更加檳榔草豆䓻仁縮砂仁加白豆䓻仁如三春之月食不下亦用青皮少陳皮多更加風藥以退其寒覆其上如初春猶寒更少加辛熱以補春氣之不足以為風藥之佐益智草豆䓻皆可也如脉弦者見風動之證以風藥通之如脉澀覺氣澀滯者加當歸身天門冬木香青皮陳皮有寒者加桂枝黃耆如胸中緻塞或氣閉悶亂者肺氣澀滯而不行宜破滯氣青皮陳皮少加木香檳榔如冬月加吳茱茰人參或胸中緻塞閉悶不通者為外寒所遏使呼出之氣不得伸故也必寸口脉弦或微緊乃胸中大寒也若加之以舌上有白胎滑者乃丹田有熱胸中有寒明矣丹田有熱者必尻臀冷前隂間冷汗兩丸冷是邪氣乘其本而正氣走於經絡中也遇寒則必作隂隂而痛以此辨丹田中伏火也加黃蘖生地黃勿誤作寒證治之如秋冬天氣寒涼而腹痛者加半夏或益智或草豆蔲之類如發熱或捫之而肌表熱者此表證也可服補中益氣湯一二服亦能得微汗則凉矣如腳膝痿軟行步乏力或疼痛乃腎肝中伏濕熱少加黃蘖空心服之不愈更增黃蘖加漢防己五分則腳膝中氣力如故也如多唾或唾白沫者胃口上停寒也加益智仁如少氣不足以息者服正藥二三服氣猶短促者為膈上及表間有寒所遏當引陽氣上升加羌活獨活藁本最少升麻多柴胡次之黃耆加倍腸澼下血論夫隂陽明論云食飲不節起居不時者隂受之隂受之則入五臟入五臟則䐜滿閉塞下為餐泄久為腸澼夫腸澼者為水榖與血另作一𣲖如􅫶桶出也今時值長夏濕熱大盛正當客氣喘而主氣弱也故腸澼之病甚以涼血地黃湯主之涼血地黃湯黃蘖去皮銼炒知毋銼炒已上各一錢青皮不去皮穰槐子炒熟地黃當歸巳上各五分右件㕮咀都作一服用水一盞煎至七分去柤溫服如小便澀臍下悶或大便則復重調木香檳榔末各五分稍熱服空心或食前主生化之源足陽明為十二經之海主經營之氣諸經皆禀之言陽明厥隂與何經相併而為病酌中以用藥如權之在衡在兩則有在雨之中在斤則有在斤之中也所以言此者發明脾胃之病不可一例而推之不可一途而取之欲人知百病皆由脾胃衰而生也毫釐之失則灾害立生假如時在長夏於長夏之令中立方謂正當主氣衰而客氣旺之時也後之處方者當從此法加時令藥名曰補脾胃瀉隂火升陽湯補脾胃瀉隂火升陽湯柴胡一兩五錢甘草炙黃耆臣蒼术泔浸去黑皮切作片日曝乾銼碎炒羌活巳上各一兩升麻八錢人參臣黃芩巳上各七錢黃連去鬚酒製五錢炒為臣為佐石膏少許長夏微用過時去之從權右件㕮咀每服三錢水二盞煎至一盞去柤大溫服早飯後午飯前間日服服藥之時宜減食宜美食服藥後忌語話一二時辰許及酒濕麵大料物之類恐大濕熱之物復助火邪而愈損元氣也亦忌冷水如此證餐泄不禁以此藥𨗳其濕如餐泄及泄不止以風藥升陽蒼术益胃去濕脉實腹脹閉塞不通從權以苦多甘少藥泄之如得通復以升陽湯助其陽或便以升陽湯中加泄藥脾胃虛不可妄用吐藥論六元政紀論云木鬱則逹之者蓋木性當動蕩軒舉是其本體今乃鬱於地中無所施為即是風失其性人身有木鬱之證者當開通之乃可用吐法以助風木是木鬱則逹之之義也又說木鬱逹之者蓋謂木初失其性鬱於地中今既開發行於天上是發而不鬱也是木復其性也有餘也有餘則兼其所勝脾土受邪見之於木鬱逹之條下不止此一驗也又厥隂司天亦風木旺也厥隂之勝亦風木旺也俱是脾胃受邪見於上條其說一同或者不悟木鬱逹之四字之義反作木鬱治之重實其實脾胃又受木制又復其木正謂補有餘而損不足也既脾胃之氣先巳不足豈不因此而重絶乎再明胸中窒塞當吐氣口三倍大於人迎是食傷太隂上部有脉下部無脉其人當吐不吐則死以其下部無脉知其木鬱在下也塞道不行而肝氣下絶矣兼肺金主塞而不降為物所膈金能尅木肝木受邪食塞胸咽故曰在下者因而越之仲景云食煩以瓜蒂散吐之如經汗下謂之虛煩又名懊憹煩躁不得眠知其木鬱也以梔子豉湯吐之昧者將鬲咽不通上支兩脅腹脹胃虛不足乃濁氣在上則生䐜脹之病吐之况胃虛必怒風木巳來乘陵胃中內經以鐵酪鎮墜之豈可反吐助其風木之邪不宜吐而吐其差舛如天地之懸隔大抵胸中窒塞煩悶不止者宜吐之耳安養心神調治脾胃論靈蘭祕典論云心者君主之官神明出焉凡怒忿悲思恐懼皆損元氣夫隂火之熾盛由心生凝滯七情不安故也心脉者神之舍心君不寧化而為火火者七神之賊也故曰隂火太盛經營之氣不能順養於神乃脉病也神無所養津液不行不能生血脉也心之神真氣之别名也得血則生血生則脉旺脉者神之舍若心生凝滯七情離形而脉中唯有火矣善治斯疾者惟在調和脾胃使心無凝滯或生歡欣或逢喜事或天氣暄和居溫和之處或食滋味或眼前見欲愛事則慧然如無病矣蓋胃中元氣得舒伸故也凡治病當問其所便黃帝針經云中熱消疸則便寒寒中之屬則便熱胃中熱則消穀令人懸心善飢臍巳上皮熱腸中熱則出黃如糜臍巳下皮寒胃中寒則腹脹腸中寒則腸鳴餐泄一說腸中寒則食巳窘迫腸鳴切痛大便色白腸中寒胃中熱則疾飢小便痛脹腸中熱胃中寒則脹而且泄非獨腸中熱則泄胃中寒𫝊化亦泄胃欲熱飲腸欲寒飲雖好惡不同春夏先治標秋冬先治本衣服寒無悽愴暑無出汗熱無灼灼寒無愴愴寒溫中適故氣將持乃不致邪僻也此規矩法度乃常道也正理也揆度也當臨事制宜以反常合變耳胃氣下溜五臟氣皆亂其為病互相出見論黃帝曰何謂逆而亂岐伯曰清氣在隂濁氣在陽榮氣順脉衛氣逆行清濁相干亂於胸中是為大悗故氣亂於心則煩心密默俯首靜伏亂於肺則俯仰喘喝按手以呼亂於腸胃則為霍亂亂於臂脛則為四厥亂於頭則為厥逆頭重眩仆大法云從下上者引而去之又法云在經者宜發之黃帝曰五亂者刺之有道乎岐伯曰有道以下有道以去審知其道是為身寶黃帝曰願聞其道岐伯曰氣在於心者取之手少隂心主之輸神門太陵滋以化源補以甘溫㵼以甘寒以酸收之以小苦通之以微苦辛甘輕劑同精𨗳氣使復其本位氣在於肺者取之手太隂滎足少隂輸角際并大淵腧太隂以苦甘寒乃亂於胸中之氣以分化之味去之若成痿者以𨗳濕熱苦善多涕從權治以辛熱仍引胃氣前出陽道不令濕土尅腎其穴在太溪氣在於腸胃者取之足太隂陽明不下者取之三里章門中脘三里因足太隂虛者於募穴中𨗳引之於血中有一說腑輸去腑病也胃虛而致太隂無所禀者於足陽明胃之募穴中引𨗳如氣逆上為霍亂者取三里氣下乃止不下復始氣在於頭取之天柱大杼不知取足太陽滎輸通谷深束谷深先取天柱大杼不補不㵼以𨗳氣而已取足太陽膀胱經中不補不㵼深取通谷束骨丁心火巳脾土穴中以引𨗳去之如用藥於太陽引經藥中少加苦寒甘寒以𨗳去之清涼為之輔佐及使氣在於臂足取之先取血脉後取其陽明少陽之滎輸二間三間深取之內庭陷谷探取之視其足臂之血絡盡取之後治其痿厥皆不補不㵼從隂深取引而上之上之者出也去也皆隂火有餘陽氣不足伏匿於地中者血榮也當從隂引陽先於地中升舉陽氣次㵼隂火乃𨗳氣同精之法黃帝曰補㵼奈何岐伯曰徐入徐出謂之𨗳氣補㵼無形謂之同精是非有餘不足也亂氣之相逆也帝曰允乎哉道明乎哉論清著之玉版命曰治亂也隂病治陽陽病治隂隂陽應象論云審其隂陽以别柔剛陽病治隂隂病治陽定其血氣各守其鄉血實宜決之氣虛宜掣引之夫隂病在陽者是天外風寒之邪乘中而外入在人之背上腑腧臟腧是人之受天外客邪亦有二說中於陽則流於經此病始於外寒終歸外熱故以治風寒之邪治其各臟之腧非止風寒而已亦淫濕暑燥火皆五臟所受乃筋骨血脉受邪各有背上五臟腧以除之傷寒一說從仲景中風者有風論中暑者治在背上小腸腧中濕者治在胃腧中燥者治在大腸腧此皆六淫客邪有餘之病皆㵼在背之腑腧若病久𫝊變有虛有實各隨病之𫝊變補㵼不定只治在背腑腧另有上熱下寒經曰隂病在陽當從陽引隂必須先去絡脉經隧之血若隂中火旺上騰於天致六陽反不衰而上充者先去五臟之血絡引而下行天氣降下則下寒之病自去矣慎勿獨㵼其六陽此病陽亢乃隂火之邪滋之只去隂火只損血絡經隧之邪勿誤也陽病在隂者病從隂引陽是水穀之寒熱感則害人六腑又曰飲食失節及勞役形質隂火乘於坤土之中致穀氣榮氣清氣胃氣元氣不得上升滋於六腑之陽氣是五陽之氣先絶於外外者天也下流伏於坤土隂火之中皆先由喜怒悲憂恐為五賊所傷而後胃氣不行勞役飲食不節繼之則元氣乃傷當從胃合五里穴中推而揚之以伸元氣故曰從隂引陽若元氣愈不足治在腹上諸腑之募穴若𫝊在五臟為九竅不通隨各竅之病治其各臟之募穴於腹故曰五臟不平乃六腑元氣閉塞之所生也又曰五臟不和九竅不通皆陽氣不足隂氣有餘故曰陽不勝其隂凡治腹之募皆為元氣不足從隂引陽勿誤也若錯補四末之腧錯㵼四末之餘錯㵼者差尤甚矣按岐伯所說況取穴於天上天上者人之背上五臟六腑之腧豈有生者乎興言及此寒心徹骨若六淫客邪及上熱下寒筋骨皮肉血脉之病錯取客於胃之合及諸腹之募者必危亦岐伯之言下工豈可不慎哉三焦元氣衰旺黃帝針經云上氣不足腦為之不滿耳為之苦鳴頭為之傾目為之瞑中氣不足溲便為之變腸為之苦鳴下氣不足則為痿厥心悗補足外踝下留之如裏急後重又不去者當下之如有傳變隨證加減如腹中動搖有水聲而小便不調者停飲也診顯何臟之脉以去水飲藥㵼之假令脉洪大用㵼火利小便藥之類是也如胃虛不能食而大渴不止者不可用淡滲之藥止之乃胃中元氣少故也與七味白术散補之如發熱惡熱煩燥大渴不止肌熱不欲近衣其脉洪大按之無力者或兼目痛鼻乾者非白虎湯證也此血虛發躁當以黃耆一兩當歸身二錢㕮咀水煎服如大便閉塞或裏急後重數至圊而不能便或少有白膿或少有血慎勿利之利之則必致病重反鬱結而不通也以升陽除濕防風湯舉其陽則隂氣自降矣升陽除濕防風湯蒼术泔浸去皮四兩防風二錢白术白茯苓白芍藥巳上各一錢件㕮咀除蒼术另作片子水一碗半煮此三元真氣衰憊皆由脾胃先虛而氣不上行之所致也加之以喜怒悲憂恐危亡速矣脾胃論卷中
